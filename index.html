<!DOCTYPE html>
<html lang="en">
<head>

<title>FleetOps</title>

<style>

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#0f1117;color:#e2e8f0}
#root{height:100%;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a3048;border-radius:2px}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:#181c27;border-right:0.5px solid #2a3048;display:flex;flex-direction:column}
.sidebar-logo{padding:18px 20px 14px;border-bottom:0.5px solid #2a3048}
.sidebar-logo h1{font-size:15px;font-weight:600;color:#e2e8f0;letter-spacing:-0.02em}
.sidebar-logo p{font-size:11px;color:#6b7a9f;margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px}
.nav-section{font-size:10px;color:#6b7a9f;text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 4px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:#6b7a9f;cursor:pointer;margin-bottom:1px;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{color:#e2e8f0;background:#1e2333}
.nav-item.active{background:rgba(59,126,255,.15);color:#3b7eff;font-weight:500}
.nav-badge{margin-left:auto;background:rgba(239,68,68,.2);color:#f87171;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.mobile-bar{display:none;align-items:center;padding:12px 16px;border-bottom:0.5px solid #2a3048;background:#181c27;gap:12px}
.mobile-bar span{font-size:14px;font-weight:500}
.menu-btn{background:none;border:none;color:#6b7a9f;cursor:pointer;padding:4px;border-radius:6px;display:flex;flex-shrink:0}
.page{flex:1;overflow-y:auto;padding:20px 24px}
.overlay{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6)}
.overlay.open{display:flex}
.drawer{width:260px;background:#181c27;border-right:0.5px solid #2a3048;display:flex;flex-direction:column;position:relative;z-index:1}
.card{background:#1e2333;border:0.5px solid #2a3048;border-radius:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:0.5px solid #2a3048;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:600;color:#e2e8f0;display:flex;align-items:center;gap:6px}
.card-link{font-size:11px;color:#3b7eff;cursor:pointer;background:none;border:none}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.metric{background:#181c27;border-radius:8px;padding:14px 16px;cursor:default}
.metric.clickable{cursor:pointer;transition:border .15s}
.metric.clickable:hover{border:0.5px solid rgba(59,126,255,.5)}
.metric-label{font-size:11px;color:#6b7a9f;margin-bottom:6px}
.metric-value{font-size:26px;font-weight:600;color:#e2e8f0;line-height:1}
.metric-sub{font-size:11px;color:#6b7a9f;margin-top:4px}
.metric-sub.warn{color:#f59e0b}.metric-sub.danger{color:#ef4444}
.grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px}
.divide-row{border-bottom:0.5px solid #2a3048;display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background .1s}
.divide-row:last-child{border-bottom:none}
.divide-row:hover{background:rgba(255,255,255,.03)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:#22c55e}.dot-amber{background:#f59e0b}.dot-red{background:#ef4444}.dot-gray{background:#6b7a9f}
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;display:inline-block}
.b-urgent{background:rgba(239,68,68,.2);color:#f87171}.b-high{background:rgba(245,158,11,.2);color:#fbbf24}
.b-normal{background:rgba(59,126,255,.2);color:#60a5fa}.b-low{background:rgba(107,122,159,.2);color:#94a3b8}
.b-open{background:rgba(245,158,11,.2);color:#fbbf24}.b-in_progress{background:rgba(59,126,255,.2);color:#60a5fa}
.b-on_hold{background:rgba(107,122,159,.2);color:#94a3b8}.b-completed{background:rgba(34,197,94,.2);color:#4ade80}
.b-cancelled{background:rgba(239,68,68,.2);color:#f87171}.b-active{background:rgba(34,197,94,.2);color:#4ade80}
.b-in_shop{background:rgba(245,158,11,.2);color:#fbbf24}.b-down{background:rgba(239,68,68,.2);color:#f87171}
.b-retired{background:rgba(107,122,159,.2);color:#94a3b8}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:#3b7eff;color:#fff;border:none}.btn-primary:hover{background:#5a94ff}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:#94a3b8;border:0.5px solid #2a3048}.btn-ghost:hover{background:#1e2333;color:#e2e8f0}
.btn-danger{background:transparent;color:#f87171;border:0.5px solid rgba(239,68,68,.3)}.btn-danger:hover{background:rgba(239,68,68,.1)}
.btn-success{background:rgba(34,197,94,.12);color:#4ade80;border:0.5px solid rgba(34,197,94,.3)}.btn-success:hover{background:rgba(34,197,94,.22)}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-icon{background:none;border:none;color:#6b7a9f;cursor:pointer;padding:4px;border-radius:6px;display:flex;transition:color .15s}
.btn-icon:hover{color:#e2e8f0}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;color:#6b7a9f;margin-bottom:6px;font-weight:500}
.form-input,.form-select,.form-textarea{width:100%;background:#181c27;border:0.5px solid #2a3048;border-radius:8px;padding:8px 12px;font-size:13px;color:#e2e8f0;font-family:inherit;transition:border .15s;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#3b7eff}
.form-input::placeholder{color:#6b7a9f}
.form-textarea{resize:vertical}.form-select{appearance:none;cursor:pointer}
.form-grid{display:grid;gap:12px}.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-3{grid-template-columns:1fr 1fr 1fr}.form-grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
.error-box{background:rgba(239,68,68,.1);border:0.5px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;color:#f87171;font-size:13px;margin-bottom:16px}
.success-box{background:rgba(34,197,94,.1);border:0.5px solid rgba(34,197,94,.3);border-radius:8px;padding:10px 14px;color:#4ade80;font-size:13px;margin-bottom:16px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-header h2{font-size:18px;font-weight:600;color:#e2e8f0}
.page-header p{font-size:12px;color:#6b7a9f;margin-top:2px}
.table-wrap{overflow-x:auto}
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:500;color:#6b7a9f;padding:10px 16px;border-bottom:0.5px solid #2a3048}
td{padding:11px 16px;border-bottom:0.5px solid #2a3048;color:#e2e8f0}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6b7a9f}
.alert{display:flex;align-items:center;gap:10px;border-radius:10px;padding:12px 16px;margin-bottom:12px;font-size:13px}
.alert-danger{background:rgba(239,68,68,.1);border:0.5px solid rgba(239,68,68,.3);color:#fca5a5}
.alert-warn{background:rgba(245,158,11,.1);border:0.5px solid rgba(245,158,11,.3);color:#fcd34d}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#6b7a9f;pointer-events:none}
.search-input{padding-left:34px !important}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:640px){.modal-overlay{align-items:center}}
.modal{background:#1e2333;border:0.5px solid #2a3048;border-radius:16px 16px 0 0;width:100%;max-width:560px;padding:20px;max-height:90vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:16px}}
.modal-wide{max-width:700px}
.modal h3{font-size:16px;font-weight:500;color:#e2e8f0;margin-bottom:16px}
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.asset-card{background:#1e2333;border:0.5px solid #2a3048;border-radius:12px;padding:16px;cursor:pointer;transition:border-color .15s}
.asset-card:hover{border-color:rgba(59,126,255,.4)}
.tabs{display:flex;gap:2px;background:#181c27;border-radius:10px;padding:4px;margin-bottom:16px;overflow-x:auto}
.tab{padding:6px 14px;border-radius:7px;font-size:13px;color:#6b7a9f;cursor:pointer;border:none;background:none;transition:all .15s;font-family:inherit;white-space:nowrap;flex-shrink:0}
.tab.active{background:#1e2333;color:#e2e8f0;font-weight:500}
.workload-info{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.workload-bar-bg{height:6px;background:#181c27;border-radius:3px}
.workload-bar{height:6px;background:#3b7eff;border-radius:3px;transition:width .3s}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.detail-field label{font-size:11px;color:#6b7a9f;display:block;margin-bottom:3px}
.detail-field p{font-size:13px;color:#e2e8f0}
.back-btn{background:none;border:none;color:#6b7a9f;cursor:pointer;padding:4px;border-radius:6px;display:flex;flex-shrink:0}
.back-btn:hover{color:#e2e8f0}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quick-btn{text-align:left;padding:12px;border-radius:10px;border:0.5px solid #2a3048;background:transparent;cursor:pointer;transition:all .15s;font-family:inherit}
.quick-btn:hover{border-color:rgba(59,126,255,.4);background:rgba(59,126,255,.05)}
.quick-btn .q-title{font-size:13px;font-weight:500;color:#e2e8f0}
.quick-btn .q-sub{font-size:11px;color:#6b7a9f;margin-top:2px}
.type-select{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.type-btn{flex:1;min-width:80px;padding:8px;border-radius:8px;border:0.5px solid #2a3048;background:transparent;color:#6b7a9f;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;text-transform:capitalize}
.type-btn.active{border-color:#3b7eff;background:rgba(59,126,255,.1);color:#3b7eff;font-weight:500}
.avatar{width:40px;height:40px;border-radius:50%;background:rgba(59,126,255,.2);color:#60a5fa;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.import-zone{border:2px dashed #2a3048;border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:16px}
.import-zone:hover{border-color:#3b7eff;background:rgba(59,126,255,.05)}
.import-zone input{display:none}
.import-preview{background:#181c27;border-radius:8px;overflow:hidden;margin-bottom:16px;max-height:200px;overflow-y:auto}
/* ===== WORK ORDER ===== */
.wo-page{max-width:880px}
.wo-section{background:#181c27;border-radius:12px;padding:20px;margin-bottom:16px}
.wo-section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:0.5px solid #2a3048;flex-wrap:wrap}
.wo-section-title{font-size:13px;font-weight:600;color:#e2e8f0}
.wo-section-sub{font-size:12px;color:#60a5fa;font-weight:600;margin-left:auto}
/* Inspection grid */
.insp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px;margin-bottom:12px}
.insp-item{background:#1e2333;border-radius:8px;padding:10px 12px}
.insp-item label{font-size:10px;color:#6b7a9f;display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.isel{width:100%;background:#0f1117;border:0.5px solid #2a3048;border-radius:6px;padding:6px 10px;font-size:12px;color:#e2e8f0;font-family:inherit;outline:none;cursor:pointer;appearance:none}
.isel:focus{border-color:#3b7eff}
.isel.ok{border-color:rgba(34,197,94,.6);color:#4ade80}
.isel.warn{border-color:rgba(245,158,11,.6);color:#fbbf24}
.isel.bad{border-color:rgba(239,68,68,.6);color:#f87171}
.insp-full{grid-column:1/-1}
.insp-full input{width:100%;background:#0f1117;border:0.5px solid #2a3048;border-radius:6px;padding:7px 10px;font-size:12px;color:#e2e8f0;font-family:inherit;outline:none}
.insp-full input:focus{border-color:#3b7eff}
/* Depth grid (4 corners) */
.corner-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.corner-box{background:#1e2333;border-radius:8px;padding:12px;text-align:center}
.corner-box .pos{font-size:9px;font-weight:700;color:#6b7a9f;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.corner-box input{width:100%;background:#0f1117;border:0.5px solid #2a3048;border-radius:6px;padding:7px 6px;font-size:15px;font-weight:700;color:#e2e8f0;text-align:center;font-family:'JetBrains Mono',monospace;outline:none}
.corner-box input:focus{border-color:#3b7eff}
.corner-box .unit{font-size:10px;color:#6b7a9f;margin-top:4px}
/* Time/parts rows */
.entry-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid #2a3048}
.entry-row:last-child{border-bottom:none}
/* Cost summary */
.cost-bar{background:rgba(59,126,255,.07);border:0.5px solid rgba(59,126,255,.2);border-radius:10px;padding:16px;margin-bottom:16px}
.cost-line{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:#e2e8f0}
.cost-line.total{font-weight:700;font-size:16px;border-top:0.5px solid rgba(59,126,255,.3);margin-top:8px;padding-top:10px;color:#60a5fa}
/* Print */
@media print{
  .shell,.sidebar,.mobile-bar,.overlay,.no-print{display:none!important}
  #printArea{display:block!important;padding:20px;font-family:Arial,sans-serif;color:#000;font-size:11px}
  body{background:white}
}
#printArea{display:none}
@media(max-width:1024px){.sidebar{display:none}.mobile-bar{display:flex}.metrics{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}.page{padding:16px}}
@media(max-width:640px){.metrics{grid-template-columns:1fr 1fr}.form-grid-3{grid-template-columns:1fr 1fr}.form-grid-4{grid-template-columns:1fr 1fr}.form-grid-2{grid-template-columns:1fr}.detail-grid{grid-template-columns:1fr 1fr}.corner-grid{grid-template-columns:1fr 1fr}.insp-grid{grid-template-columns:1fr}table{display:none}.table-mobile{display:block}}
@media(min-width:641px){.table-mobile{display:none}}

</style>
</head>

function iClass(v){

  const ok=['Good','Full','Pass','Clean','None','Works','Functional','No Leak','Normal','Present'];
  const warn=['Fair','Moderate','Low','Caution','Seeping','Minor','Dirty','Pending'];
  const bad=['Bad','Very Low','Fail','Critical','Leaking','Replace','Severe','Active'];
  if(ok.some(x=>v.startsWith(x))||(parseInt(v)>=6&&!isNaN(parseInt(v))))return 'ok';
  if(warn.some(x=>v.startsWith(x))||(parseInt(v)>=3&&parseInt(v)<6&&!isNaN(parseInt(v))))return 'warn';
  if(bad.some(x=>v.startsWith(x))||(parseInt(v)<=2&&!isNaN(parseInt(v))))return 'bad';

}

function SamsaraBtn({refetch}){
  const [syncing, setSyncing] = useState(false);
  const [result, setResult] = useState(null);

  // Use the exact deployed Edge Function URL for Samsara sync.
  const SAMSARA_SYNC_URL = 'https://zmxynphetgelskqnadbg.supabase.co/functions/v1/samsara-sync';

  const doSync = async () => {
    setSyncing(true);
    setResult(null);

    try {
      const resp = await fetch(SAMSARA_SYNC_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + SUPA_KEY
        }
      });

      const raw = await resp.text();
      let data = {};
      try {
        data = raw ? JSON.parse(raw) : {};
      } catch (_err) {
        data = { error: raw || 'Invalid response from samsara-sync' };
      }

      if (!resp.ok) {
        throw new Error(data?.error || data?.message || ('HTTP ' + resp.status));
      }

      setResult(data);

      if (data?.synced > 0 && typeof refetch === 'function') {
        refetch();
      }
    } catch (e) {
      setResult({
        error: e?.message || 'Failed to fetch'
      });
    } finally {
      setSyncing(false);
    }
  };

  return h('div', { style: { position: 'relative', display: 'inline-block' } },
    h('button', {
      className: 'btn btn-ghost',
      style: {
        fontSize: 12,
        gap: 6,
        color: syncing ? '#6b7a9f' : '#60a5fa',
        borderColor: syncing ? '#2a3048' : 'rgba(59,126,255,.4)'
      },
      onClick: doSync,
      disabled: syncing
    }, syncing ? '⏳ Syncing...' : '🛰 Samsara Sync'),
    result && h('div', {
      style: {
        position: 'absolute',
        top: '100%',
        right: 0,
        marginTop: 6,

        : h('div', null,
            h('div', { style: { color: '#4ade80', fontSize: 13, fontWeight: 600, marginBottom: 6 } },

      h('div',{className:'btn-row'},h('button',{className:'btn btn-p',onClick:save,disabled:saving},saving?'Saving...':'Log Service'),h('button',{className:'btn btn-g',onClick:onClose},'Cancel'))
    ));
  };

  return h('div',{className:'page'},
    h('div',{className:'page-header'},
      h('div',null,h('h2',null,'Service Logs'),h('p',null,filtered.length+' records')),
      h('button',{className:'btn btn-p',onClick:()=>setShowModal(true)},h(IPlus),' Log Service')
    ),
    h('div',{className:'filters'},
      h('div',{className:'search-wrap'},h(ISearch),h('input',{className:'form-input si',placeholder:'Search logs, asset, vendor...',value:search,onChange:e=>setSearch(e.target.value)})),
      h('select',{className:'form-select',style:{width:140},value:assetTypeF,onChange:e=>setAssetTypeF(e.target.value)},h('option',{value:''},'All Types'),['vehicle','trailer','equipment'].map(t=>h('option',{key:t,value:t},t.charAt(0).toUpperCase()+t.slice(1)))),
      h('select',{className:'form-select',style:{width:160},value:vendorF,onChange:e=>setVendorF(e.target.value)},h('option',{value:''},'All Vendors'),allVendors.map(v=>h('option',{key:v,value:v},v))),
      h('select',{className:'form-select',style:{width:150},value:sortBy,onChange:e=>setSortBy(e.target.value)},h('option',{value:'date_desc'},'Newest First'),h('option',{value:'date_asc'},'Oldest First'),h('option',{value:'cost_desc'},'Highest Cost'),h('option',{value:'vendor'},'By Vendor'))
    ),
    h('div',{className:'card'},
      loading?h('div',{style:{padding:32,textAlign:'center',color:'#6b7a9f'}},'Loading...'):
      filtered.length===0?h('div',{style:{padding:32,textAlign:'center',color:'#6b7a9f'}},'No service records found'):
      filtered.map(log=>h('div',{key:log.id,style:{padding:'14px 16px',borderBottom:'.5px solid #2a3048'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}},
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:4,flexWrap:'wrap'}},
              h('span',{style:{fontSize:13,fontWeight:600}},log.service_type),
              h('span',{style:{fontSize:12,color:'#3b7eff'}},log.asset?.name),
              log.vendor_name&&h('span',{style:{fontSize:11,background:'rgba(107,122,159,.15)',color:'#94a3b8',padding:'1px 8px',borderRadius:10}},log.vendor_name)
            ),
            h('div',{style:{fontSize:12,color:'#6b7a9f',display:'flex',gap:16,flexWrap:'wrap'}},
              log.odometer_miles&&h('span',null,log.odometer_miles.toLocaleString()+' mi'),
              log.engine_hours&&h('span',null,log.engine_hours+' hrs'),
              log.cost&&h('span',{style:{color:'#4ade80',fontWeight:500}},'$'+parseFloat(log.cost).toFixed(2))
            ),
            log.description&&h('div',{style:{fontSize:12,color:'#6b7a9f',marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},log.description),
            log.next_service_date&&h('div',{style:{fontSize:11,color:'#fbbf24',marginTop:3}},'Next: '+fmtDate(log.next_service_date)+(log.next_service_miles?' or '+log.next_service_miles.toLocaleString()+' mi':'')),
            log.invoice_name&&h('button',{style:{marginTop:6,fontSize:11,color:'#60a5fa',background:'none',border:'.5px solid rgba(59,126,255,.3)',borderRadius:6,padding:'2px 10px',cursor:'pointer'},onClick:()=>{if(log.invoice_data){const a=document.createElement('a');a.href=log.invoice_data;a.download=log.invoice_name;a.click();}}},'\uD83D\uDCC4 '+log.invoice_name)
          ),
          h('div',{style:{fontSize:12,color:'#6b7a9f',flexShrink:0,textAlign:'right'}},fmtDate(log.serviced_at))
        )
      ))
    ),
    showModal&&h(LogModal,{onClose:()=>setShowModal(false)})
  );
}

function App(){
  const[page,setPage]=useState('dashboard');const[drawerOpen,setDrawerOpen]=useState(false);
  const{data:wos}=useQuery(()=>sb.from('work_orders').select('id').in('status',['open','in_progress']));
  const{data:parts}=useQuery(()=>sb.from('parts').select('id,quantity_on_hand,reorder_point'));
  const badges={wo:(wos||[]).length,parts:(parts||[]).filter(p=>p.track_inventory!==false&&p.quantity_on_hand<=p.reorder_point).length};
  const lbl=NAV.find(n=>page===n.id||page.startsWith(n.id.replace('workorders','wo').replace('fleet','asset').replace('servicelogs','service')))?.label||'FleetOps';
  const render=()=>{
    if(page==='dashboard')return h(Dashboard,{setPage});
    if(page==='workorders')return h(WorkOrders,{setPage});
    if(page==='wo-new')return h(WOForm,{id:null,setPage});
    if(page.startsWith('wo-edit-'))return h(WOForm,{id:page.replace('wo-edit-',''),setPage});
    if(page.startsWith('wo-'))return h(WOForm,{id:page.replace('wo-',''),setPage});
    if(page==='fleet')return h(Fleet,{setPage});
    if(page==='asset-new')return h(AssetForm,{id:null,setPage});
    if(page.startsWith('asset-edit-'))return h(AssetForm,{id:page.replace('asset-edit-',''),setPage});
    if(page.startsWith('asset-'))return h(AssetDetail,{id:page.replace('asset-',''),setPage});
    if(page==='parts')return h(Parts,null);
    if(page==='technicians')return h(Technicians,null);
    if(page==='servicelogs')return h(ServiceLogs,null);
    return h(Dashboard,{setPage});
  };
  return h('div',{className:'shell'},
    h('div',{className:'sidebar'},h(SidebarNav,{page,setPage,badges,onClose:null})),
    h('div',{className:'overlay'+(drawerOpen?' open':''),onClick:()=>setDrawerOpen(false)},h('div',{className:'drawer',onClick:e=>e.stopPropagation()},h(SidebarNav,{page,setPage,badges,onClose:()=>setDrawerOpen(false)}))),
    h('div',{className:'main'},h('div',{className:'mobile-bar'},h('button',{className:'menu-btn',onClick:()=>setDrawerOpen(true)},h(IMenu)),h('span',null,lbl)),render())
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));

</script>
