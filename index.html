<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin></script>
<style>


/* ── Base reset ─────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#0f1117;color:#e2e8f0}
#root{height:100%;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a3048;border-radius:2px}
/* ── Layout ─────────────────────────────────────────────────────── */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:#181c27;border-right:0.5px solid #2a3048;display:flex;flex-direction:column}
.sidebar-logo{padding:18px 20px 14px;border-bottom:0.5px solid #2a3048}
.sidebar-logo h1{font-size:15px;font-weight:600;color:#e2e8f0;letter-spacing:-0.02em}
.sidebar-logo p{font-size:11px;color:#6b7a9f;margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px}
.nav-section{font-size:10px;color:#6b7a9f;text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 4px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:#6b7a9f;cursor:pointer;margin-bottom:1px;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{color:#e2e8f0;background:#1e2333}
.nav-item.active{background:rgba(59,126,255,.15);color:#3b7eff;font-weight:500}
.nav-badge{margin-left:auto;background:rgba(239,68,68,.2);color:#f87171;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.mobile-bar{display:none;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid #2a3048;background:#181c27}
.mobile-bar span{font-size:14px;font-weight:500}
.menu-btn{background:none;border:none;color:#6b7a9f;cursor:pointer;padding:4px;border-radius:6px;display:flex;flex-shrink:0}
.page{flex:1;overflow-y:auto;padding:20px 24px}
.overlay{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6)}
.overlay.open{display:flex}
.drawer{width:260px;background:#181c27;border-right:0.5px solid #2a3048;display:flex;flex-direction:column;position:relative;z-index:1}
/* ── Cards ─────────────────────────────────────────────────────── */
.card{background:#1e2333;border:0.5px solid #2a3048;border-radius:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:0.5px solid #2a3048;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:600;color:#e2e8f0;display:flex;align-items:center;gap:6px}
.card-link{font-size:11px;color:#3b7eff;cursor:pointer;background:none;border:none;font-family:inherit}
/* ── Metrics ────────────────────────────────────────────────────── */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.metric{background:#181c27;border:0.5px solid #2a3048;border-radius:8px;padding:14px 16px}
.metric.clickable{cursor:pointer;transition:border .15s}
.metric.clickable:hover{border-color:rgba(59,126,255,.5)}
.metric-label{font-size:11px;color:#6b7a9f;margin-bottom:6px}
.metric-value{font-size:26px;font-weight:600;color:#e2e8f0;line-height:1}
.metric-sub{font-size:11px;color:#6b7a9f;margin-top:4px}
.metric-sub.warn{color:#f59e0b}.metric-sub.danger{color:#ef4444}
.grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px}
/* ── Rows ───────────────────────────────────────────────────────── */
.divide-row,.row{border-bottom:0.5px solid #2a3048;display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background .1s}
.divide-row:last-child,.row:last-child{border-bottom:none}
.divide-row:hover,.row:hover{background:rgba(255,255,255,.03)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:#22c55e}.dot-amber{background:#f59e0b}.dot-red{background:#ef4444}.dot-gray{background:#6b7a9f}
/* ── Badges ─────────────────────────────────────────────────────── */
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;display:inline-block;white-space:nowrap}
.b-urgent{background:rgba(239,68,68,.2);color:#f87171}.b-high{background:rgba(245,158,11,.2);color:#fbbf24}
.b-normal{background:rgba(59,126,255,.2);color:#60a5fa}.b-low{background:rgba(107,122,159,.2);color:#94a3b8}
.b-open{background:rgba(245,158,11,.2);color:#fbbf24}.b-in_progress{background:rgba(59,126,255,.2);color:#60a5fa}
.b-on_hold{background:rgba(107,122,159,.2);color:#94a3b8}.b-completed{background:rgba(34,197,94,.2);color:#4ade80}
.b-cancelled{background:rgba(239,68,68,.2);color:#f87171}.b-active{background:rgba(34,197,94,.2);color:#4ade80}
.b-in_shop{background:rgba(245,158,11,.2);color:#fbbf24}.b-down{background:rgba(239,68,68,.2);color:#f87171}
.b-retired{background:rgba(107,122,159,.2);color:#94a3b8}
/* ── Buttons ────────────────────────────────────────────────────── */
.btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;border:none}
.btn-primary,.btn-p{background:#3b7eff;color:#fff;border:none}.btn-primary:hover,.btn-p:hover{background:#5a94ff}
.btn-primary:disabled,.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost,.btn-g{background:transparent;color:#94a3b8;border:0.5px solid #2a3048}.btn-ghost:hover,.btn-g:hover{background:#1e2333;color:#e2e8f0}
.btn-danger,.btn-d{background:transparent;color:#f87171;border:0.5px solid rgba(239,68,68,.3)}.btn-danger:hover,.btn-d:hover{background:rgba(239,68,68,.1)}
.btn-success,.btn-s{background:rgba(34,197,94,.12);color:#4ade80;border:0.5px solid rgba(34,197,94,.3)}.btn-success:hover,.btn-s:hover{background:rgba(34,197,94,.22)}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-icon,.icon-btn{background:none;border:none;color:#6b7a9f;cursor:pointer;padding:4px;border-radius:6px;display:flex;transition:color .15s}
.btn-icon:hover,.icon-btn:hover{color:#e2e8f0}
/* ── Forms ──────────────────────────────────────────────────────── */
.form-group,.fg{margin-bottom:14px}
.form-label,.fl{display:block;font-size:11px;color:#6b7a9f;margin-bottom:5px;font-weight:500}
.form-input,.form-select,.form-textarea,.fi,.fsel,.fta{width:100%;background:#181c27;border:0.5px solid #2a3048;border-radius:8px;padding:8px 12px;font-size:13px;color:#e2e8f0;font-family:inherit;transition:border .15s;outline:none;-webkit-appearance:none;appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus,.fi:focus,.fsel:focus,.fta:focus{border-color:#3b7eff}
.form-input::placeholder,.fi::placeholder{color:#6b7a9f}
.form-textarea,.fta{resize:vertical}
.form-select,.fsel{cursor:pointer}
.form-grid,.fg{display:grid;gap:12px}
.form-grid-2,.fg2{grid-template-columns:1fr 1fr}.form-grid-3,.fg3{grid-template-columns:1fr 1fr 1fr}
.form-grid-4,.fg4{grid-template-columns:1fr 1fr 1fr 1fr}
.error-box,.ebox{background:rgba(239,68,68,.1);border:0.5px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;color:#f87171;font-size:13px;margin-bottom:14px}
.success-box{background:rgba(34,197,94,.1);border:0.5px solid rgba(34,197,94,.3);border-radius:8px;padding:10px 14px;color:#4ade80;font-size:13px;margin-bottom:14px}
/* ── Page header ─────────────────────────────────────────────────── */
.page-header,.phdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-header h2,.phdr h2{font-size:18px;font-weight:600;color:#e2e8f0}
.page-header p,.phdr p{font-size:12px;color:#6b7a9f;margin-top:2px}
/* ── Tables ──────────────────────────────────────────────────────── */
.table-wrap,.tw{overflow-x:auto}
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:500;color:#6b7a9f;padding:10px 16px;border-bottom:0.5px solid #2a3048}
td{padding:10px 16px;border-bottom:0.5px solid #2a3048;color:#e2e8f0}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6b7a9f}
/* ── Alerts ──────────────────────────────────────────────────────── */
.alert{display:flex;align-items:center;gap:10px;border-radius:10px;padding:12px 16px;margin-bottom:12px;font-size:13px}
.alert-danger,.alert-d{background:rgba(239,68,68,.1);border:0.5px solid rgba(239,68,68,.3);color:#fca5a5}
.alert-warn,.alert-w{background:rgba(245,158,11,.1);border:0.5px solid rgba(245,158,11,.3);color:#fcd34d}
/* ── Filters ─────────────────────────────────────────────────────── */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap,.sw{position:relative;flex:1;min-width:180px}
.search-wrap svg,.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#6b7a9f;pointer-events:none}
.search-input,.si{padding-left:34px !important}
/* ── Modals ──────────────────────────────────────────────────────── */
.modal-overlay,.moverlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:640px){.modal-overlay,.moverlay{align-items:center}}
.modal{background:#1e2333;border:0.5px solid #2a3048;border-radius:16px 16px 0 0;width:100%;max-width:560px;padding:20px;max-height:90vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:16px}}
.modal-wide,.mw{max-width:700px}
.modal h3{font-size:16px;font-weight:500;color:#e2e8f0;margin-bottom:16px}
/* ── Asset cards ─────────────────────────────────────────────────── */
.asset-grid,.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.asset-card,.acard{background:#1e2333;border:0.5px solid #2a3048;border-radius:12px;padding:16px;cursor:pointer;transition:border-color .15s}
.asset-card:hover,.acard:hover{border-color:rgba(59,126,255,.4)}
/* ── Tabs ────────────────────────────────────────────────────────── */
.tabs{display:flex;gap:2px;background:#181c27;border-radius:10px;padding:4px;overflow-x:auto;margin-bottom:16px}
.tab{padding:6px 14px;border-radius:7px;font-size:13px;color:#6b7a9f;cursor:pointer;border:none;background:none;transition:all .15s;font-family:inherit;white-space:nowrap;flex-shrink:0}
.tab.on,.tab.active{background:#1e2333;color:#e2e8f0;font-weight:500}
/* ── Misc ────────────────────────────────────────────────────────── */
.avatar,.av{width:40px;height:40px;border-radius:50%;background:rgba(59,126,255,.2);color:#60a5fa;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.workload-info{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.workload-bar-bg{height:6px;background:#181c27;border-radius:3px}
.workload-bar{height:6px;background:#3b7eff;border-radius:3px;transition:width .3s}
.detail-grid,.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.detail-field label,.df label{font-size:11px;color:#6b7a9f;display:block;margin-bottom:2px}
.detail-field p,.df p{font-size:13px;color:#e2e8f0}
.back-btn,.back{background:none;border:none;color:#6b7a9f;cursor:pointer;padding:4px;border-radius:6px;display:flex;flex-shrink:0}
.back-btn:hover,.back:hover{color:#e2e8f0}
.quick-grid,.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quick-btn,.qbtn{text-align:left;padding:12px;border-radius:10px;border:0.5px solid #2a3048;background:transparent;cursor:pointer;transition:all .15s;font-family:inherit}
.quick-btn:hover,.qbtn:hover{border-color:rgba(59,126,255,.4);background:rgba(59,126,255,.05)}
.quick-btn .q-title,.qt{font-size:13px;font-weight:500;color:#e2e8f0}
.quick-btn .q-sub,.qs{font-size:11px;color:#6b7a9f;margin-top:2px}
.type-select,.tpick{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.type-btn,.tpick-btn{flex:1;min-width:80px;padding:8px;border-radius:8px;border:0.5px solid #2a3048;background:transparent;color:#6b7a9f;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;text-transform:capitalize}
.type-btn.active,.tpick-btn.on{border-color:#3b7eff;background:rgba(59,126,255,.1);color:#3b7eff;font-weight:500}
.import-zone,.izone{border:2px dashed #2a3048;border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:14px}
.import-zone:hover,.izone:hover{border-color:#3b7eff;background:rgba(59,126,255,.05)}
.import-zone input,.izone input{display:none}
.import-preview{background:#181c27;border-radius:8px;overflow:hidden;margin-bottom:14px;max-height:200px;overflow-y:auto}
/* ── Work Order ──────────────────────────────────────────────────── */
.wo-page,.wo-wrap{max-width:880px}
.wo-section,.wo-sec{background:#181c27;border-radius:12px;padding:20px;margin-bottom:14px}
.wo-section-header,.wo-sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:0.5px solid #2a3048;flex-wrap:wrap}
.wo-section-title,.wo-sec-title{font-size:13px;font-weight:600;color:#e2e8f0}
.wo-section-sub,.wo-sec-sub{font-size:12px;color:#60a5fa;font-weight:600;margin-left:auto}
/* ── Inspection ──────────────────────────────────────────────────── */
.insp-grid,.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px;margin-bottom:12px}
.insp-item,.ii{background:#1e2333;border:0.5px solid #2a3048;border-radius:8px;padding:10px 12px}
.insp-item label,.ii label{font-size:10px;color:#6b7a9f;display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.isel{width:100%;background:#0f1117;border:0.5px solid #2a3048;border-radius:6px;padding:6px 10px;font-size:12px;color:#e2e8f0;font-family:inherit;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none}
.isel:focus{border-color:#3b7eff}
.isel.ok{border-color:rgba(34,197,94,.6);color:#4ade80}
.isel.warn{border-color:rgba(245,158,11,.6);color:#fbbf24}
.isel.bad{border-color:rgba(239,68,68,.6);color:#f87171}
.insp-full,.ifull{grid-column:1/-1}
.insp-full input,.ifull input{width:100%;background:#0f1117;border:0.5px solid #2a3048;border-radius:6px;padding:7px 10px;font-size:12px;color:#e2e8f0;font-family:inherit;outline:none}
.insp-full input:focus,.ifull input:focus{border-color:#3b7eff}
/* ── Corner boxes ────────────────────────────────────────────────── */
.corner-grid,.cgrid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.corner-box,.cbox{background:#1e2333;border:0.5px solid #2a3048;border-radius:8px;padding:12px;text-align:center;transition:border-color .2s}
.corner-box .pos,.cpos{font-size:9px;font-weight:700;color:#6b7a9f;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.corner-box input,.cbox input{width:100%;background:#0f1117;border:0.5px solid #2a3048;border-radius:6px;padding:7px 6px;font-size:16px;font-weight:700;color:#e2e8f0;text-align:center;font-family:'JetBrains Mono',monospace;outline:none;-webkit-appearance:none}
.corner-box input:focus,.cbox input:focus{border-color:#3b7eff}
.corner-box .unit,.cunit{font-size:10px;color:#6b7a9f;margin-top:4px;transition:color .2s}
/* ── Cost bar ────────────────────────────────────────────────────── */
.cost-bar,.cbar{background:rgba(59,126,255,.07);border:0.5px solid rgba(59,126,255,.2);border-radius:10px;padding:16px;margin-bottom:14px}
.cost-line,.cline{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:#e2e8f0}
.cost-line.total,.cline.tot{font-weight:700;font-size:16px;border-top:0.5px solid rgba(59,126,255,.3);margin-top:8px;padding-top:10px;color:#60a5fa}

/* ── Light mode contrast fixes ─────────────────────────────────────── */
body.light{background:#e9ecf5;color:#1e2433}
body.light .page{background:#e9ecf5}
body.light .sidebar{background:#f0f2fa;border-right-color:#d0d6e8}
body.light .sidebar-logo h1{color:#1e2433}
body.light .sidebar-logo p{color:#4a5568}
body.light .nav-section{color:#718096}
body.light .nav-item{color:#4a5568}
body.light .nav-item:hover{background:#e2e6f3;color:#1e2433}
body.light .nav-item.active{background:rgba(29,78,216,.12);color:#1d4ed8}
body.light .mobile-bar{background:#f0f2fa;border-bottom-color:#d0d6e8}
body.light .mobile-bar span{color:#1e2433}
body.light .card{background:#f5f6fa;border-color:#d0d6e8}
body.light .card-header{border-bottom-color:#d0d6e8}
body.light .card-title{color:#1e2433}
body.light .card-link{color:#1d4ed8}
body.light .metric{background:#f5f6fa;border-color:#d0d6e8}
body.light .metric-label{color:#4a5568}
body.light .metric-value{color:#1e2433}
body.light .metric-sub{color:#4a5568}
body.light .divide-row{border-bottom-color:#d0d6e8;color:#1e2433}
body.light .divide-row:hover{background:#e2e6f3}
body.light .row{border-bottom-color:#d0d6e8}
body.light .row:hover{background:#e2e6f3}
body.light th{color:#374151;border-bottom-color:#d0d6e8;background:#e4e7f2;font-weight:600}
body.light td{border-bottom-color:#d0d6e8;color:#1e2433;background:#f5f6fa}
body.light tr:hover td{background:#e8ebf5}
body.light .mono{color:#374151;font-weight:500}
body.light .form-label,body.light .fl{color:#374151}
body.light label{color:#374151}
body.light .form-input,body.light .fi,body.light .form-select,body.light .fsel,body.light .form-textarea,body.light .fta{background:#fff;border-color:#c3cad8;color:#1e2433}
body.light .form-input::placeholder,body.light .fi::placeholder{color:#94a3b8}
body.light .form-input:focus,body.light .fi:focus,body.light .form-select:focus,body.light .fsel:focus{border-color:#3b7eff;background:#fff}
body.light .page-header h2,body.light .phdr h2{color:#1e2433}
body.light .page-header p,body.light .phdr p{color:#4a5568}
body.light .modal{background:#f5f6fa;border-color:#d0d6e8}
body.light .modal h3{color:#1e2433}
body.light .modal-overlay,body.light .moverlay{background:rgba(0,0,0,.45)}
body.light .tabs{background:#dde1ef;border-color:#d0d6e8}
body.light .tab{color:#4a5568}
body.light .tab.active,body.light .tab.on{background:#f5f6fa;color:#1e2433;box-shadow:0 1px 3px rgba(0,0,0,.1)}
body.light .wo-section,body.light .wo-sec{background:#eef0f8;border:0.5px solid #d0d6e8}
body.light .wo-section-header,body.light .wo-sec-hdr{border-bottom-color:#d0d6e8;background:#e4e7f2}
body.light .wo-section-title,body.light .wo-sec-title{color:#1e2433}
body.light .wo-section-sub,body.light .wo-sec-sub{color:#4a5568}
body.light .insp-item,body.light .ii{background:#e8ebf5;border-color:#d0d6e8}
body.light .insp-item label,body.light .ii label{color:#374151}
body.light .isel{background:#fff;border-color:#c3cad8;color:#1e2433}
body.light .insp-full input,body.light .ifull input{background:#fff;border-color:#c3cad8;color:#1e2433}
body.light .corner-box,body.light .cbox{background:#e8ebf5;border-color:#d0d6e8}
body.light .corner-box .pos,body.light .cpos{color:#4a5568}
body.light .corner-box input,body.light .cbox input{background:#fff;border-color:#c3cad8;color:#1e2433}
body.light .corner-box .unit,body.light .cunit{color:#4a5568}
body.light .btn-ghost,body.light .btn-g{border-color:#c3cad8;color:#374151;background:#f0f2fa}
body.light .btn-ghost:hover,body.light .btn-g:hover{background:#e2e6f3;color:#1e2433}
body.light .btn-icon,body.light .icon-btn{color:#4a5568}
body.light .btn-icon:hover,body.light .icon-btn:hover{color:#1e2433}
body.light .drawer{background:#f5f6fa;border-right-color:#d0d6e8}

const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

// ── Auth ────────────────────────────────────────────────────────────────────
function useAuth(){
  const[session,setSession]=useState(null);
  const[appUser,setAppUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);

  const loadAppUser=async(uid)=>{
    try{
      const{data,error}=await sb.from('app_users').select('*').eq('id',uid).single();
      if(error){console.warn('loadAppUser error:',error.message);setAppUser(null);}
      else setAppUser(data||null);
    }catch(e){console.warn('loadAppUser failed:',e);setAppUser(null);}
    finally{setAuthLoading(false);}
  };

  useEffect(()=>{
    // Get initial session
    sb.auth.getSession().then(({data:{session:s}})=>{
      setSession(s);
      if(s?.user) loadAppUser(s.user.id);
      else setAuthLoading(false);
    }).catch(()=>setAuthLoading(false));

    // Listen for auth changes
    const{data:{subscription}}=sb.auth.onAuthStateChange((_event,s)=>{
      setSession(s);
      if(s?.user) loadAppUser(s.user.id);
      else{setAppUser(null);setAuthLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const signIn=async(email,password)=>{
    const{error}=await sb.auth.signInWithPassword({email,password});
    return error;
  };
  const signOut=async()=>{
    await sb.auth.signOut();
    setSession(null);setAppUser(null);setAuthLoading(false);
  };
  const isAdmin=appUser?.role==='admin';
  const isTech=appUser?.role==='tech';
  const myTechId=appUser?.technician_id||null;
  return{session,appUser,authLoading,signIn,signOut,isAdmin,isTech,myTechId};
}

    if(!email||!password){setErr('Email and password required');return;}
    setLoading(true);setErr('');
    const error=await signIn(email,password);
    setLoading(false);
    if(error)setErr(error.message==='Invalid login credentials'?'Incorrect email or password':error.message);
  };

  const sendReset=async()=>{
    if(!email.trim()){setErr('Enter your email address first');return;}
    setLoading(true);setErr('');
    const{error}=await sb.auth.resetPasswordForEmail(email.trim(),{redirectTo:window.location.origin});

function useQuery(fn,deps=[]){
  const[data,setData]=useState(null);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);
  const refetch=useCallback(async()=>{setLoading(true);setError(null);try{const r=await fn();if(r.error)throw r.error;setData(r.data);}catch(e){setError(e.message);}finally{setLoading(false);}},deps);
  useEffect(()=>{refetch();},[refetch]);
  return{data,loading,error,refetch};
}

function iClass(v){
  if(!v||v==='N/A')return '';
  const ok=['Good','Full','Pass','Clean','None','Works','Functional','No Leak','Normal','Present'];
  const warn=['Fair','Moderate','Low','Caution','Seeping','Minor','Dirty','Pending'];
  const bad=['Bad','Very Low','Fail','Critical','Leaking','Replace','Severe','Active'];
  if(ok.some(x=>v.startsWith(x))||(parseInt(v)>=6&&!isNaN(parseInt(v))))return 'ok';
  if(warn.some(x=>v.startsWith(x))||(parseInt(v)>=3&&parseInt(v)<6&&!isNaN(parseInt(v))))return 'warn';
  if(bad.some(x=>v.startsWith(x))||(parseInt(v)<=2&&!isNaN(parseInt(v))))return 'bad';
  return '';
}

function parseCSV(t){
  const lines=t.trim().split(/\r?\n/);if(lines.length<2)return[];
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const v=[];let c='';let q=false;
    for(let i=0;i<line.length;i++){if(line[i]==='"'){q=!q;}else if(line[i]===','&&!q){v.push(c.trim());c='';}else c+=line[i];}
    v.push(c.trim());const row={};hdrs.forEach((h,i)=>{row[h]=(v[i]||'').replace(/^"|"$/g,'');});return row;
  });
}

function ServiceIntervals({setPage,isTech=false}){
  const{data:types,loading:tLoad,refetch:refetchTypes}=useQuery(()=>sb.from('interval_types').select('*').order('name'));
  const{data:assignments,refetch:refetchAssign}=useQuery(()=>sb.from('asset_intervals').select('*,asset:assets(id,name,asset_number,asset_type,odometer_miles),interval_type:interval_types(name,interval_miles,interval_days,category)').order('next_service_miles',{ascending:true,nullsFirst:false}));
  const{data:assets}=useQuery(()=>sb.from('assets').select('id,name,asset_number,asset_type,odometer_miles').neq('status','retired').order('name'));
  const[tab,setTab]=useState('overview');
  const[showTypeModal,setShowTypeModal]=useState(false);
  const[showAssignModal,setShowAssignModal]=useState(false);
  const[editType,setEditType]=useState(null);
  const[filterCat,setFilterCat]=useState('');
  const[sortDir,setSortDir]=useState('asc');
  const[selected,setSelected]=useState(new Set());
  const[snoozeModal,setSnoozeModal]=useState(null); // {id, name}
  const[resolveModal,setResolveModal]=useState(null); // assignment

  const now=new Date();

  const getStatus=(a)=>{
    const cur=a.asset?.odometer_miles||0;
    const milesUntil=a.next_service_miles!=null?a.next_service_miles-cur:null;
    const daysUntil=a.next_service_date?Math.ceil((new Date(a.next_service_date)-now)/86400000):null;
    // Check if snoozed
    if(a.snoozed_until&&new Date(a.snoozed_until)>now)return{state:'snoozed',milesUntil,daysUntil};
    if(a.snoozed_until_miles&&cur<a.snoozed_until_miles)return{state:'snoozed',milesUntil,daysUntil};
    if(milesUntil!=null&&milesUntil<=0)return{state:'overdue',milesUntil,daysUntil};
    if(daysUntil!=null&&daysUntil<=0)return{state:'overdue',milesUntil,daysUntil};
    if(milesUntil!=null&&milesUntil<=500)return{state:'due_soon',milesUntil,daysUntil};
    if(daysUntil!=null&&daysUntil<=14)return{state:'due_soon',milesUntil,daysUntil};
    return{state:'ok',milesUntil,daysUntil};
  };

  const stateStyle={
    overdue:{bg:'rgba(239,68,68,.15)',color:'#f87171',label:'OVERDUE'},
    due_soon:{bg:'rgba(245,158,11,.15)',color:'#fbbf24',label:'Due Soon'},
    ok:{bg:'rgba(34,197,94,.15)',color:'#4ade80',label:'OK'},
    snoozed:{bg:'rgba(107,122,159,.15)',color:'#94a3b8',label:'Snoozed'},

    .in('status',['open','in_progress','on_hold'])

    .select('*,asset:assets(name,asset_number,odometer_miles),interval_type:interval_types(name,category)')

  const now=new Date();
  const myWOs=myTechId?(wos||[]).filter(wo=>!wo.technician_id||wo.technician_id===myTechId):(wos||[]);

    const cur=a.asset?.odometer_miles||0;

    const daysUntil=a.next_service_date?Math.ceil((new Date(a.next_service_date)-now)/86400000):null;

  const[page,setPage_]=useState('dashboard');

  const TECH_PAGES=['tech-dashboard','workorders','fleet','parts','intervals','scheduler','documents'];
  const visibleNav=isTech?[{id:'tech-dashboard',label:'Dashboard',Icon:IDash,section:'Overview'},...NAV.filter(n=>TECH_PAGES.includes(n.id)&&n.id!=='tech-dashboard')]:isAdmin?NAV:NAV.filter(n=>n.id!=='users');
  const lbl=NAV.find(n=>page===n.id||page.startsWith(n.id.replace('workorders','wo').replace('fleet','asset').replace('servicelogs','service')))?.label||'ShopWorxOne';
  // Auth gate — show login if no session
  if(authLoading)return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f1117'}},h('div',{style:{color:'#6b7a9f',fontSize:14}},'Loading…'));
  if(!session)return h(LoginScreen,{signIn});
  if(!appUser)return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f1117'}},
    h('div',{style:{textAlign:'center'}},
      h('div',{style:{fontSize:16,color:'#e2e8f0',marginBottom:8}},'Account not set up'),
      h('div',{style:{fontSize:13,color:'#6b7a9f',marginBottom:16}},'Your login works but your account has no role assigned. Contact your administrator.'),
      h('button',{className:'btn btn-ghost',onClick:signOut},'Sign Out')
    )
  );
  if(appUser.active===false)return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f1117'}},h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:18,color:'#f87171',marginBottom:8}},'Account Disabled'),h('div',{style:{fontSize:13,color:'#6b7a9f',marginBottom:16}},'Contact your administrator.'),h('button',{className:'btn btn-ghost',onClick:signOut},'Sign Out')));

  const render=()=>{
    if(page==='tech-dashboard')return h(TechDashboard,{setPage,myTechId});
    if(page==='dashboard')return h(Dashboard,{setPage,isTech});
    if(page==='workorders')return h(WorkOrders,{setPage,isTech,myTechId});
    if(page==='wo-new')return h(WOForm,{id:null,setPage,isAdmin,isTech,myTechId});
    if(page.startsWith('wo-edit-'))return h(WOForm,{id:page.replace('wo-edit-',''),setPage,isAdmin,isTech,myTechId});
    if(page.startsWith('wo-'))return h(WOForm,{id:page.replace('wo-',''),setPage,isAdmin,isTech,myTechId});
    if(page==='fleet'||page.startsWith('fleet-back-')||page.startsWith('fleet-status-'))return h(Fleet,{setPage,isTech,initialType:page.startsWith('fleet-back-')?page.replace('fleet-back-',''):'',initialStatus:page.startsWith('fleet-status-')?page.replace('fleet-status-',''):''});
    if(page==='asset-new')return h(AssetForm,{id:null,setPage});
    if(page.startsWith('asset-edit-'))return h(AssetForm,{id:page.replace('asset-edit-',''),setPage});
    if(page.startsWith('asset-'))return h(AssetDetail,{id:page.replace('asset-',''),setPage,isTech});
    if(page==='parts')return h(Parts,{setPage,isTech});
    if(page==='technicians')return h(Technicians,null);
    if(page==='servicelogs')return h(ServiceLogs,null);
    if(page==='intervals')return h(ServiceIntervals,{setPage,isTech});
    if(page==='scheduler')return h(Scheduler,{setPage});
    if(page==='documents')return h(Documents,{setPage,isTech});
    if(page==='users'&&isAdmin)return h(UsersPage,{setPage});
    return h(Dashboard,{setPage,isTech,isAdmin});
  };
  return h('div',{className:'shell'},
    h('button',{
      onClick:toggleTheme,
      title:isDark?'Switch to light mode':'Switch to dark mode',
      style:{position:'fixed',bottom:20,right:20,zIndex:200,background:isDark?'#1e2333':'#fff',border:'0.5px solid '+(isDark?'#2a3048':'#e2e8f0'),borderRadius:20,padding:'8px 14px',cursor:'pointer',boxShadow:'0 4px 12px rgba(0,0,0,.25)',display:'flex',alignItems:'center',gap:6,color:isDark?'#e2e8f0':'#1a202c',fontFamily:'inherit',fontSize:12,fontWeight:500}
    },isDark?'☀️  Light':'🌙  Dark'),
    h('div',{className:'sidebar'},h(SidebarNav,{page,setPage,badges,appUser,signOut,visibleNav,onClose:null})),
    h('div',{className:'overlay'+(drawerOpen?' open':''),onClick:()=>setDrawerOpen(false)},h('div',{className:'drawer',onClick:e=>e.stopPropagation()},h(SidebarNav,{page,setPage,badges,appUser,signOut,visibleNav,onClose:()=>setDrawerOpen(false)}))),
    h('div',{className:'main'},h('div',{className:'mobile-bar'},h('button',{className:'menu-btn',onClick:()=>setDrawerOpen(true)},h(IMenu)),h('span',null,lbl)),render())
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));



</script>
</body>
</html>
