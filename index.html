<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>FleetOps</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FleetOps"/>
<meta name="theme-color" content="#0f1117"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#0f1117;color:#e2e8f0}
#root{height:100%;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a3048;border-radius:2px}

/* Layout */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:#181c27;border-right:0.5px solid #2a3048;display:flex;flex-direction:column}
.sidebar-logo{padding:18px 20px 14px;border-bottom:0.5px solid #2a3048}
.sidebar-logo h1{font-size:15px;font-weight:600;color:#e2e8f0;letter-spacing:-0.02em}
.sidebar-logo p{font-size:11px;color:#6b7a9f;margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px}
.nav-section{font-size:10px;color:#6b7a9f;text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 4px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:#6b7a9f;cursor:pointer;margin-bottom:1px;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{color:#e2e8f0;background:#1e2333}
.nav-item.active{background:rgba(59,126,255,.15);color:#3b7eff;font-weight:500}
.nav-badge{margin-left:auto;background:rgba(239,68,68,.2);color:#f87171;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.mobile-bar{display:none;align-items:center;padding:12px 16px;border-bottom:0.5px solid #2a3048;background:#181c27}
.mobile-bar span{font-size:14px;font-weight:500;margin-left:12px}
.menu-btn{background:none;border:none;color:#6b7a9f;cursor:pointer;padding:4px;border-radius:6px;display:flex}
.menu-btn:hover{color:#e2e8f0}
.page{flex:1;overflow-y:auto;padding:20px 24px}
.overlay{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6)}
.overlay.open{display:flex}
.drawer{width:260px;background:#181c27;border-right:0.5px solid #2a3048;display:flex;flex-direction:column;position:relative;z-index:1}

/* Cards & Components */
.card{background:#1e2333;border:0.5px solid #2a3048;border-radius:12px}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.metric{background:#181c27;border-radius:8px;padding:14px 16px;cursor:default}
.metric.clickable{cursor:pointer;transition:border .15s}
.metric.clickable:hover{border:0.5px solid rgba(59,126,255,.5)}
.metric-label{font-size:11px;color:#6b7a9f;margin-bottom:6px}
.metric-value{font-size:26px;font-weight:600;color:#e2e8f0;line-height:1}
.metric-sub{font-size:11px;color:#6b7a9f;margin-top:4px}
.metric-sub.warn{color:#f59e0b}
.metric-sub.danger{color:#ef4444}
.grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:0.5px solid #2a3048}
.card-title{font-size:13px;font-weight:500;color:#e2e8f0}
.card-link{font-size:11px;color:#3b7eff;cursor:pointer;background:none;border:none}
.card-link:hover{text-decoration:underline}
.divide-row{border-bottom:0.5px solid #2a3048;display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background .1s}
.divide-row:last-child{border-bottom:none}
.divide-row:hover{background:rgba(255,255,255,.03)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:#22c55e}
.dot-amber{background:#f59e0b}
.dot-red{background:#ef4444}
.dot-gray{background:#6b7a9f}

/* Badges */
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;display:inline-block}
.b-urgent{background:rgba(239,68,68,.2);color:#f87171}
.b-high{background:rgba(245,158,11,.2);color:#fbbf24}
.b-normal{background:rgba(59,126,255,.2);color:#60a5fa}
.b-low{background:rgba(107,122,159,.2);color:#94a3b8}
.b-open{background:rgba(245,158,11,.2);color:#fbbf24}
.b-in_progress{background:rgba(59,126,255,.2);color:#60a5fa}
.b-on_hold{background:rgba(107,122,159,.2);color:#94a3b8}
.b-completed{background:rgba(34,197,94,.2);color:#4ade80}
.b-cancelled{background:rgba(239,68,68,.2);color:#f87171}
.b-active{background:rgba(34,197,94,.2);color:#4ade80}
.b-in_shop{background:rgba(245,158,11,.2);color:#fbbf24}
.b-down{background:rgba(239,68,68,.2);color:#f87171}
.b-retired{background:rgba(107,122,159,.2);color:#94a3b8}

/* Buttons */
.btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-primary{background:#3b7eff;color:#fff;border:none}
.btn-primary:hover{background:#5a94ff}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:#94a3b8;border:0.5px solid #2a3048}
.btn-ghost:hover{background:#1e2333;color:#e2e8f0}
.btn-danger{background:transparent;color:#f87171;border:0.5px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.1)}
.btn-row{display:flex;gap:8px;align-items:center}
.btn-icon{background:none;border:none;color:#6b7a9f;cursor:pointer;padding:4px;border-radius:6px;display:flex;transition:color .15s}
.btn-icon:hover{color:#e2e8f0}

/* Forms */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;color:#6b7a9f;margin-bottom:6px;font-weight:500}
.form-input,.form-select,.form-textarea{width:100%;background:#181c27;border:0.5px solid #2a3048;border-radius:8px;padding:8px 12px;font-size:13px;color:#e2e8f0;font-family:inherit;transition:border .15s;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#3b7eff}
.form-input::placeholder{color:#6b7a9f}
.form-textarea{resize:vertical}
.form-select{appearance:none;cursor:pointer}
.form-grid{display:grid;gap:12px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-3{grid-template-columns:1fr 1fr 1fr}
.error-box{background:rgba(239,68,68,.1);border:0.5px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;color:#f87171;font-size:13px;margin-bottom:16px}

/* Page headers */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-header h2{font-size:18px;font-weight:600;color:#e2e8f0}
.page-header p{font-size:12px;color:#6b7a9f;margin-top:2px}

/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:500;color:#6b7a9f;padding:10px 16px;border-bottom:0.5px solid #2a3048}
td{padding:11px 16px;border-bottom:0.5px solid #2a3048;color:#e2e8f0}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6b7a9f}

/* Alert */
.alert{display:flex;align-items:center;gap:10px;border-radius:10px;padding:12px 16px;margin-bottom:12px;font-size:13px}
.alert-danger{background:rgba(239,68,68,.1);border:0.5px solid rgba(239,68,68,.3);color:#fca5a5}
.alert-warn{background:rgba(245,158,11,.1);border:0.5px solid rgba(245,158,11,.3);color:#fcd34d}

/* Filters bar */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#6b7a9f;pointer-events:none}
.search-input{padding-left:34px !important}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:640px){.modal-overlay{align-items:center}}
.modal{background:#1e2333;border:0.5px solid #2a3048;border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:20px;max-height:90vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:16px}}
.modal h3{font-size:16px;font-weight:500;color:#e2e8f0;margin-bottom:16px}

/* Fleet cards */
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.asset-card{background:#1e2333;border:0.5px solid #2a3048;border-radius:12px;padding:16px;cursor:pointer;transition:border-color .15s}
.asset-card:hover{border-color:rgba(59,126,255,.4)}

/* Tabs */
.tabs{display:flex;gap:2px;background:#181c27;border-radius:10px;padding:4px;margin-bottom:16px;width:fit-content}
.tab{padding:6px 14px;border-radius:7px;font-size:13px;color:#6b7a9f;cursor:pointer;border:none;background:none;transition:all .15s;font-family:inherit}
.tab.active{background:#1e2333;color:#e2e8f0;font-weight:500}

/* Workload bar */
.workload-row{margin-bottom:12px}
.workload-info{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.workload-bar-bg{height:6px;background:#181c27;border-radius:3px}
.workload-bar{height:6px;background:#3b7eff;border-radius:3px;transition:width .3s}

/* Detail page */
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.detail-field label{font-size:11px;color:#6b7a9f;display:block;margin-bottom:3px}
.detail-field p{font-size:13px;color:#e2e8f0}
.back-btn{background:none;border:none;color:#6b7a9f;cursor:pointer;padding:4px;border-radius:6px;display:flex;margin-right:8px}
.back-btn:hover{color:#e2e8f0}

/* Quick actions */
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quick-btn{text-align:left;padding:12px;border-radius:10px;border:0.5px solid #2a3048;background:transparent;cursor:pointer;transition:all .15s;font-family:inherit}
.quick-btn:hover{border-color:rgba(59,126,255,.4);background:rgba(59,126,255,.05)}
.quick-btn .q-title{font-size:13px;font-weight:500;color:#e2e8f0}
.quick-btn .q-sub{font-size:11px;color:#6b7a9f;margin-top:2px}

/* Type selector */
.type-select{display:flex;gap:8px;margin-bottom:16px}
.type-btn{flex:1;padding:8px;border-radius:8px;border:0.5px solid #2a3048;background:transparent;color:#6b7a9f;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;text-transform:capitalize}
.type-btn.active{border-color:#3b7eff;background:rgba(59,126,255,.1);color:#3b7eff;font-weight:500}

/* Tech avatar */
.avatar{width:40px;height:40px;border-radius:50%;background:rgba(59,126,255,.2);color:#60a5fa;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}

/* Responsive */
@media(max-width:1024px){
  .sidebar{display:none}
  .mobile-bar{display:flex}
  .metrics{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
  .page{padding:16px}
}
@media(max-width:640px){
  .metrics{grid-template-columns:1fr 1fr}
  .form-grid-3{grid-template-columns:1fr 1fr}
  .form-grid-2{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr 1fr}
  table{display:none}
  .table-mobile{display:block}
}
@media(min-width:641px){.table-mobile{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createElement:h,useState,useEffect,useCallback,useRef,Fragment} = React;

// ── Supabase ──────────────────────────────────────────────────────────────────
const SUPA_URL = 'https://zmxynphetgelskqnadbg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpteHlucGhldGdlbHNrcW5hZGJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2Mzg5ODgsImV4cCI6MjA5MDIxNDk4OH0.BDHe4XsGCvHY0sIxN5ncIV7-EYEj4lq-nuxFfvySZgU';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

function useQuery(fn, deps=[]) {
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const refetch=useCallback(async()=>{
    setLoading(true);setError(null);
    try{const r=await fn();if(r.error)throw r.error;setData(r.data);}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  },deps);
  useEffect(()=>{refetch();},[refetch]);
  return {data,loading,error,refetch};
}

// ── Icons ─────────────────────────────────────────────────────────────────────
const svg=(d,opts={})=>h('svg',{viewBox:'0 0 20 20',width:16,height:16,fill:'none',stroke:'currentColor',strokeWidth:1.5,...opts},
  typeof d==='string'?h('path',{d}):d);
const IMenu=()=>svg([h('path',{d:'M3 6h14M3 10h14M3 14h14',key:'m'})]);
const IClose=()=>svg([h('path',{d:'M5 5l10 10M15 5L5 15',key:'x',strokeWidth:2})]);
const IPlus=()=>svg([h('path',{d:'M10 4v12M4 10h12',key:'p',strokeWidth:2})]);
const IBack=()=>svg([h('path',{d:'M12 5l-5 5 5 5',key:'b',strokeWidth:2})]);
const IEdit=()=>svg([h('path',{d:'M11.5 3.5l5 5L7 18H2v-5L11.5 3.5z',key:'e'})]);
const ITrash=()=>svg([h('path',{d:'M3 5h14M8 5V3h4v2M5 5l1 12h8l1-12',key:'t'})]);
const ISearch=()=>svg([h('circle',{cx:8.5,cy:8.5,r:5.5,key:'c'}),h('path',{d:'M13 13l4 4',key:'l'})]);
const IAlert=()=>svg([h('path',{d:'M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495z',fill:'currentColor',key:'a'}),h('path',{d:'M10 7v4M10 13v.5',stroke:'#0f1117',strokeWidth:1.5,key:'b'})],{fill:'currentColor',stroke:'none'});
const IDash=()=>svg([h('rect',{x:2,y:2,width:6,height:6,rx:1,fill:'currentColor',key:'a'}),h('rect',{x:10,y:2,width:6,height:6,rx:1,fill:'currentColor',key:'b'}),h('rect',{x:2,y:10,width:6,height:6,rx:1,fill:'currentColor',key:'c'}),h('rect',{x:10,y:10,width:6,height:6,rx:1,fill:'currentColor',key:'d'})],{fill:'none',stroke:'none'});
const IWO=()=>svg([h('rect',{x:3,y:3,width:14,height:14,rx:2,key:'r'}),h('path',{d:'M7 7h6M7 10h6M7 13h4',key:'l'})]);
const IFleet=()=>svg([h('rect',{x:1,y:7,width:13,height:9,rx:1.5,key:'b'}),h('path',{d:'M4 7V5.5A1.5 1.5 0 015.5 4h4A1.5 1.5 0 0111 5.5V7',key:'t'}),h('circle',{cx:4.5,cy:16,r:1.5,key:'w1'}),h('circle',{cx:10.5,cy:16,r:1.5,key:'w2'}),h('path',{d:'M14 11h3a1 1 0 011 1v2a1 1 0 01-1 1h-3',key:'h'})]);
const IParts=()=>svg([h('rect',{x:2,y:2,width:7,height:7,rx:1,key:'a'}),h('rect',{x:11,y:2,width:7,height:4,rx:1,key:'b'}),h('rect',{x:2,y:11,width:7,height:7,rx:1,key:'c'}),h('path',{d:'M11 10v8l2.5-2 2.5 2v-8',key:'d'})]);
const ITech=()=>svg([h('circle',{cx:8,cy:6,r:3,key:'h'}),h('path',{d:'M2 18c0-3.3 2.7-6 6-6s6 2.7 6 6',key:'b'}),h('path',{d:'M14 8l1.5 1.5L18 7',key:'c'})]);
const ILogs=()=>svg([h('rect',{x:2,y:2,width:16,height:16,rx:2,key:'r'}),h('path',{d:'M6 7h8M6 10.5h8M6 14h5',key:'l'})]);

// ── Helpers ───────────────────────────────────────────────────────────────────
const PBadge=({cls,label})=>h('span',{className:`badge ${cls}`},label);
const priorityCls={urgent:'b-urgent',high:'b-high',normal:'b-normal',low:'b-low'};
const statusLabel={open:'Open',in_progress:'In Progress',on_hold:'On Hold',completed:'Completed',cancelled:'Cancelled'};
const statusCls={open:'b-open',in_progress:'b-in_progress',on_hold:'b-on_hold',completed:'b-completed',cancelled:'b-cancelled'};
const assetStatusCls={active:'b-active',in_shop:'b-in_shop',down:'b-down',retired:'b-retired'};
const dotCls={active:'dot-green',in_shop:'dot-amber',down:'dot-red',retired:'dot-gray'};
const fmtDate=d=>d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
const fmtCurrency=v=>v?`$${parseFloat(v).toFixed(2)}`:'—';
const initials=name=>{const p=name.trim().split(' ');return(p.length>=2?p[0][0]+p[p.length-1][0]:p[0].slice(0,2)).toUpperCase();};

// ── Nav ───────────────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',label:'Dashboard',Icon:IDash,section:'Overview'},
  {id:'workorders',label:'Work Orders',Icon:IWO,section:'Operations',badge:'wo'},
  {id:'servicelogs',label:'Service Logs',Icon:ILogs,section:'Operations'},
  {id:'fleet',label:'Fleet',Icon:IFleet,section:'Assets'},
  {id:'parts',label:'Parts Inventory',Icon:IParts,section:'Resources',badge:'parts'},
  {id:'technicians',label:'Technicians',Icon:ITech,section:'Resources'},
];

function SidebarNav({page,setPage,badges,onClose}){
  const sections=[...new Set(NAV.map(n=>n.section))];
  return h(Fragment,null,
    h('div',{className:'sidebar-logo'},
      h('h1',null,'FleetOps'),
      h('p',null,'Maintenance Platform')
    ),
    h('nav',{className:'sidebar-nav'},
      sections.map(sec=>h('div',{key:sec},
        h('div',{className:'nav-section'},sec),
        NAV.filter(n=>n.section===sec).map(({id,label,Icon,badge})=>
          h('button',{key:id,className:`nav-item${page===id?' active':''}`,onClick:()=>{setPage(id);onClose&&onClose();}},
            h(Icon),
            label,
            badge&&badges[badge]>0&&h('span',{className:'nav-badge'},badges[badge])
          )
        )
      ))
    )
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({setPage}){
  const {data:assets,loading:al}=useQuery(()=>sb.from('assets').select('*').neq('status','retired'));
  const {data:wos,loading:wl}=useQuery(()=>sb.from('work_orders').select('*,asset:assets(name,asset_number),technician:technicians(name)').in('status',['open','in_progress']).order('created_at',{ascending:false}));
  const {data:parts}=useQuery(()=>sb.from('parts').select('*'));

  const openWOs=wos||[];
  const urgent=openWOs.filter(w=>w.priority==='urgent').length;
  const down=(assets||[]).filter(a=>a.status==='down').length;
  const inShop=(assets||[]).filter(a=>a.status==='in_shop').length;
  const lowParts=(parts||[]).filter(p=>p.quantity_on_hand<=p.reorder_point);
  const outOfStock=lowParts.filter(p=>p.quantity_on_hand===0);

  return h('div',{className:'page'},
    h('div',{className:'page-header'},
      h('div',null,h('h2',null,'Dashboard'),h('p',null,new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}))),
      h('button',{className:'btn btn-primary',onClick:()=>setPage('wo-new')},h(IPlus),' New Work Order')
    ),
    urgent>0&&h('div',{className:'alert alert-danger',style:{marginBottom:16}},
      h(IAlert),`${urgent} urgent work order${urgent>1?'s':''} need immediate attention`,
      h('button',{className:'card-link',style:{marginLeft:'auto'},onClick:()=>setPage('workorders')},'View →')
    ),

// ── Work Orders ───────────────────────────────────────────────────────────────
function WorkOrders({setPage}){
  const [search,setSearch]=useState('');
  const [statusF,setStatusF]=useState('');
  const [priorityF,setPriorityF]=useState('');
  const {data:wos,loading,refetch}=useQuery(()=>sb.from('work_orders').select('*,asset:assets(name,asset_number),technician:technicians(name)').order('created_at',{ascending:false}));

  const filtered=(wos||[]).filter(wo=>{
    if(statusF&&wo.status!==statusF)return false;
    if(priorityF&&wo.priority!==priorityF)return false;
    if(search){const q=search.toLowerCase();return wo.title?.toLowerCase().includes(q)||wo.order_number?.toLowerCase().includes(q)||wo.asset?.name?.toLowerCase().includes(q)||wo.technician?.name?.toLowerCase().includes(q);}
    return true;
  });

  const handleStatusChange=async(e,wo)=>{
    e.stopPropagation();
    const updates={status:e.target.value,updated_at:new Date().toISOString()};
    if(e.target.value==='completed')updates.completed_at=new Date().toISOString();
    await sb.from('work_orders').update(updates).eq('id',wo.id);
    refetch();
  };

  return h('div',{className:'page'},
    h('div',{className:'page-header'},
      h('div',null,h('h2',null,'Work Orders'),h('p',null,`${filtered.length} orders`)),

    h('div',{className:'filters'},
      h('div',{className:'search-wrap'},h(ISearch),h('input',{className:'form-input search-input',placeholder:'Search work orders, assets, technicians...',value:search,onChange:e=>setSearch(e.target.value)})),
      h('select',{className:'form-select',style:{width:150},value:statusF,onChange:e=>setStatusF(e.target.value)},
        h('option',{value:''},'All statuses'),
        ['open','in_progress','on_hold','completed','cancelled'].map(s=>h('option',{key:s,value:s},s.replace('_',' ')))

        h('option',{value:''},'All priorities'),
        ['urgent','high','normal','low'].map(p=>h('option',{key:p,value:p},p))
      )
    ),
    h('div',{className:'card'},
      h('div',{className:'table-wrap'},
        h('table',null,
          h('thead',null,h('tr',null,['Order #','Title','Asset','Technician','Priority','Status','Due',''].map(c=>h('th',{key:c},c)))),
          h('tbody',null,loading?h('tr',null,h('td',{colSpan:8,style:{textAlign:'center',color:'#6b7a9f',padding:32}},'Loading...')):
            filtered.length===0?h('tr',null,h('td',{colSpan:8,style:{textAlign:'center',color:'#6b7a9f',padding:32}},'No work orders found')):
            filtered.map(wo=>h('tr',{key:wo.id,style:{cursor:'pointer'},onClick:()=>setPage('wo-'+wo.id)},
              h('td',null,h('span',{className:'mono'},wo.order_number)),
              h('td',null,h('span',{style:{maxWidth:200,display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},wo.title)),
              h('td',{style:{color:'#94a3b8',fontSize:12}},wo.asset?.name||'—'),
              h('td',{style:{color:'#94a3b8',fontSize:12}},wo.technician?.name||'Unassigned'),
              h('td',null,h(PBadge,{cls:priorityCls[wo.priority],label:wo.priority})),
              h('td',{onClick:e=>e.stopPropagation()},
                h('select',{className:'form-select',style:{width:130,fontSize:12,padding:'4px 8px'},value:wo.status,onChange:e=>handleStatusChange(e,wo)},
                  ['open','in_progress','on_hold','completed','cancelled'].map(s=>h('option',{key:s,value:s},s.replace('_',' ')))
                )
              ),
              h('td',{style:{color:'#6b7a9f',fontSize:12}},fmtDate(wo.due_date)),

            ))

          h('div',{style:{display:'flex',gap:8,alignItems:'center',width:'100%'}},
            h('span',{className:'mono'},wo.order_number),
            h('div',{style:{marginLeft:'auto',display:'flex',gap:4}},
              h(PBadge,{cls:priorityCls[wo.priority],label:wo.priority}),
              h(PBadge,{cls:statusCls[wo.status],label:statusLabel[wo.status]})

          h('div',{style:{fontSize:11,color:'#6b7a9f'}},(wo.asset?.name||'No asset')+' · '+(wo.technician?.name||'Unassigned'))

    h('div',{className:'card',style:{padding:16,marginBottom:16,display:'flex',alignItems:'center',gap:12}},
      h('span',{style:{fontSize:13,color:'#6b7a9f'}},'Status'),
      h('select',{className:'form-select',style:{width:180},value:wo.status,onChange:handleStatus},
        ['open','in_progress','on_hold','completed','cancelled'].map(s=>h('option',{key:s,value:s},s.replace('_',' ')))

      ),

        h('div',null,h('label',{className:'form-label'},'Category'),h('select',{className:'form-select',value:form.category,onChange:e=>set('category',e.target.value)},h('option',{value:''},'Select...'),['preventive','repair','inspection','tire','electrical','hydraulics','bodywork','other'].map(c=>h('option',{key:c,value:c},c))))
      ),

      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12}},
        active.map(t=>{
          const cnt=openByTech(t.id);
          return h('div',{key:t.id,className:'card',style:{padding:16,display:'flex',gap:12,alignItems:'flex-start'}},
            h('div',{className:'avatar'},initials(t.name)),
            h('div',{style:{flex:1,minWidth:0}},
              h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
                h('div',{style:{fontSize:14,fontWeight:500,color:'#e2e8f0'}},t.name),
                t.specialty&&h('span',{className:'badge b-normal',style:{textTransform:'capitalize'}},t.specialty)
              ),
              t.email&&h('div',{style:{fontSize:12,color:'#6b7a9f'}},t.email),
              t.phone&&h('div',{style:{fontSize:12,color:'#6b7a9f'}},t.phone),
              h('div',{className:'workload-row',style:{marginTop:8,marginBottom:0}},
                h('div',{className:'workload-info'},h('span',{style:{color:cnt>0?'#60a5fa':'#6b7a9f'}},`${cnt} open order${cnt!==1?'s':''}`)),
                h('div',{className:'workload-bar-bg'},h('div',{className:'workload-bar',style:{width:`${(cnt/maxOpen)*100}%`}}))
              )
            ),
            h('div',{className:'btn-row'},
              h('button',{className:'btn-icon',onClick:()=>setModal(t)},h(IEdit)),
              h('button',{className:'btn-icon',onClick:()=>handleDelete(t.id)},h(ITrash))
            )
          );
        })
      ),
      inactive.length>0&&h('div',{style:{marginTop:20}},
        h('div',{style:{fontSize:11,color:'#6b7a9f',textTransform:'uppercase',letterSpacing:'.08em',fontWeight:600,marginBottom:8}},'Inactive'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:8}},
          inactive.map(t=>h('div',{key:t.id,className:'card',style:{padding:14,display:'flex',gap:10,alignItems:'center',opacity:.5}},
            h('div',{className:'avatar'},initials(t.name)),
            h('div',{style:{flex:1}},h('div',{style:{fontSize:13,color:'#e2e8f0'}},t.name),t.specialty&&h('div',{style:{fontSize:11,color:'#6b7a9f',textTransform:'capitalize'}},t.specialty)),
            h('button',{className:'btn-icon',onClick:()=>setModal(t)},h(IEdit))
          ))
        )
      )
    ),
    modal!==null&&h(TechModal,{tech:modal.id?modal:null,onClose:()=>setModal(null)})
  );
}

// ── Service Logs ──────────────────────────────────────────────────────────────
function ServiceLogs(){
  const [assetF,setAssetF]=useState('');const [search,setSearch]=useState('');const [showModal,setShowModal]=useState(false);
  const {data:logs,loading,refetch}=useQuery(()=>{let q=sb.from('service_logs').select('*,asset:assets(name,asset_number),technician:technicians(name)').order('serviced_at',{ascending:false});if(assetF)q=q.eq('asset_id',assetF);return q;},[assetF]);
  const {data:assets}=useQuery(()=>sb.from('assets').select('id,name,asset_number').order('name'));
  const {data:techs}=useQuery(()=>sb.from('technicians').select('id,name').eq('status','active').order('name'));

  const filtered=(logs||[]).filter(l=>{if(!search)return true;const q=search.toLowerCase();return l.service_type?.toLowerCase().includes(q)||l.asset?.name?.toLowerCase().includes(q)||l.technician?.name?.toLowerCase().includes(q);});

  const LogModal=({onClose})=>{
    const [f,setF]=useState({asset_id:'',technician_id:'',service_type:'',description:'',odometer_miles:'',engine_hours:'',cost:'',serviced_at:new Date().toISOString().slice(0,16),next_service_miles:'',next_service_date:''});
    const [saving,setSaving]=useState(false);const [err,setErr]=useState(null);
    const s=(k,v)=>setF(p=>({...p,[k]:v}));
    const save=async()=>{
      if(!f.asset_id||!f.service_type){setErr('Asset and service type required');return;}
      setSaving(true);
      const payload={asset_id:f.asset_id,technician_id:f.technician_id||null,service_type:f.service_type,description:f.description||null,odometer_miles:f.odometer_miles?parseInt(f.odometer_miles):null,engine_hours:f.engine_hours?parseFloat(f.engine_hours):null,cost:f.cost?parseFloat(f.cost):null,serviced_at:f.serviced_at||new Date().toISOString(),next_service_miles:f.next_service_miles?parseInt(f.next_service_miles):null,next_service_date:f.next_service_date||null};
      const {error:e}=await sb.from('service_logs').insert(payload);
      setSaving(false);if(e){setErr(e.message);return;}onClose();refetch();
    };
    return h('div',{className:'modal-overlay'},h('div',{className:'modal'},
      h('h3',null,'Log Service'),
      h('div',{className:'form-grid form-grid-2',style:{marginBottom:12}},
        h('div',null,h('label',{className:'form-label'},'Asset *'),h('select',{className:'form-select',value:f.asset_id,onChange:e=>s('asset_id',e.target.value)},h('option',{value:''},'Select asset...'),(assets||[]).map(a=>h('option',{key:a.id,value:a.id},`${a.name} (${a.asset_number})`)))),
        h('div',null,h('label',{className:'form-label'},'Technician'),h('select',{className:'form-select',value:f.technician_id,onChange:e=>s('technician_id',e.target.value)},h('option',{value:''},'Unassigned'),(techs||[]).map(t=>h('option',{key:t.id,value:t.id},t.name))))
      ),
      h('div',{className:'form-group'},h('label',{className:'form-label'},'Service type *'),h('select',{className:'form-select',value:f.service_type,onChange:e=>s('service_type',e.target.value)},h('option',{value:''},'Select...'),['Oil change','PM service','Brake job','Tire rotation','Tire replacement','Inspection','Filter replacement','Fluid flush','Belt replacement','Electrical repair','Hydraulic repair','Bodywork','Other'].map(st=>h('option',{key:st,value:st},st)))),
      h('div',{className:'form-group'},h('label',{className:'form-label'},'Date / time'),h('input',{type:'datetime-local',className:'form-input',value:f.serviced_at,onChange:e=>s('serviced_at',e.target.value)})),
      h('div',{className:'form-grid form-grid-3',style:{marginBottom:12}},
        h('div',null,h('label',{className:'form-label'},'Odometer (mi)'),h('input',{type:'number',className:'form-input',value:f.odometer_miles,onChange:e=>s('odometer_miles',e.target.value)})),
        h('div',null,h('label',{className:'form-label'},'Eng. hours'),h('input',{type:'number',step:.1,className:'form-input',value:f.engine_hours,onChange:e=>s('engine_hours',e.target.value)})),
        h('div',null,h('label',{className:'form-label'},'Total cost'),h('input',{type:'number',step:.01,className:'form-input',placeholder:'0.00',value:f.cost,onChange:e=>s('cost',e.target.value)}))
      ),
      h('div',{className:'form-group'},h('label',{className:'form-label'},'Notes'),h('textarea',{className:'form-textarea',rows:3,value:f.description,onChange:e=>s('description',e.target.value)})),
      h('div',{className:'form-grid form-grid-2',style:{marginBottom:12}},
        h('div',null,h('label',{className:'form-label'},'Next service miles'),h('input',{type:'number',className:'form-input',value:f.next_service_miles,onChange:e=>s('next_service_miles',e.target.value)})),
        h('div',null,h('label',{className:'form-label'},'Next service date'),h('input',{type:'date',className:'form-input',value:f.next_service_date,onChange:e=>s('next_service_date',e.target.value)}))
      ),
      err&&h('div',{className:'error-box'},err),
      h('div',{className:'btn-row'},h('button',{className:'btn btn-primary',onClick:save,disabled:saving},saving?'Saving...':'Log service'),h('button',{className:'btn btn-ghost',onClick:onClose},'Cancel'))
    ));
  };

  return h('div',{className:'page'},
    h('div',{className:'page-header'},
      h('div',null,h('h2',null,'Service Logs'),h('p',null,`${filtered.length} records`)),
      h('button',{className:'btn btn-primary',onClick:()=>setShowModal(true)},h(IPlus),' Log Service')
    ),
    h('div',{className:'filters'},
      h('div',{className:'search-wrap'},h(ISearch),h('input',{className:'form-input search-input',placeholder:'Search logs...',value:search,onChange:e=>setSearch(e.target.value)})),
      h('select',{className:'form-select',style:{width:200},value:assetF,onChange:e=>setAssetF(e.target.value)},h('option',{value:''},'All assets'),(assets||[]).map(a=>h('option',{key:a.id,value:a.id},a.name)))
    ),
    h('div',{className:'card'},
      loading?h('div',{style:{padding:32,textAlign:'center',color:'#6b7a9f'}},'Loading...'):
      filtered.length===0?h('div',{style:{padding:32,textAlign:'center',color:'#6b7a9f'}},'No service records found'):
      filtered.map(log=>h('div',{key:log.id,style:{padding:'14px 16px',borderBottom:'0.5px solid #2a3048'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}},
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{style:{display:'flex',gap:10,alignItems:'center',marginBottom:4,flexWrap:'wrap'}},
              h('span',{style:{fontSize:13,fontWeight:500,color:'#e2e8f0'}},log.service_type),
              h('span',{style:{fontSize:12,color:'#3b7eff'}},log.asset?.name)
            ),
            h('div',{style:{fontSize:12,color:'#6b7a9f',display:'flex',gap:16,flexWrap:'wrap'}},
              log.technician?.name&&h('span',null,log.technician.name),
              log.odometer_miles&&h('span',null,log.odometer_miles.toLocaleString()+' mi'),
              log.engine_hours&&h('span',null,log.engine_hours+' hrs'),
              log.cost&&h('span',null,fmtCurrency(log.cost))
            ),
            log.description&&h('div',{style:{fontSize:12,color:'#6b7a9f',marginTop:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},log.description),
            log.next_service_date&&h('div',{style:{fontSize:12,color:'#fbbf24',marginTop:4}},`Next service: ${fmtDate(log.next_service_date)}${log.next_service_miles?' or '+log.next_service_miles.toLocaleString()+' mi':''}`)
          ),
          h('div',{style:{fontSize:12,color:'#6b7a9f',flexShrink:0,textAlign:'right'}},fmtDate(log.serviced_at))
        )
      ))
    ),
    showModal&&h(LogModal,{onClose:()=>setShowModal(false)})
  );
}

// ── App Shell ─────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState('dashboard');
  const [drawerOpen,setDrawerOpen]=useState(false);

  const {data:wos}=useQuery(()=>sb.from('work_orders').select('id').in('status',['open','in_progress']));
  const {data:parts}=useQuery(()=>sb.from('parts').select('id,quantity_on_hand,reorder_point'));
  const badges={wo:(wos||[]).length,parts:(parts||[]).filter(p=>p.quantity_on_hand<=p.reorder_point).length};

  const currentLabel=NAV.find(n=>page===n.id||page.startsWith(n.id.replace('workorders','wo').replace('fleet','asset').replace('servicelogs','service')))?.label||'FleetOps';

  const renderPage=()=>{
    if(page==='dashboard')return h(Dashboard,{setPage});
    if(page==='workorders')return h(WorkOrders,{setPage});
    if(page==='wo-new')return h(WOForm,{id:null,setPage});
    if(page.startsWith('wo-edit-'))return h(WOForm,{id:page.replace('wo-edit-',''),setPage});
    if(page.startsWith('wo-'))return h(WODetail,{id:page.replace('wo-',''),setPage});
    if(page==='fleet')return h(Fleet,{setPage});
    if(page==='asset-new')return h(AssetForm,{id:null,setPage});
    if(page.startsWith('asset-edit-'))return h(AssetForm,{id:page.replace('asset-edit-',''),setPage});
    if(page.startsWith('asset-'))return h(AssetDetail,{id:page.replace('asset-',''),setPage});
    if(page==='parts')return h(Parts,null);
    if(page==='technicians')return h(Technicians,null);
    if(page==='servicelogs')return h(ServiceLogs,null);
    return h(Dashboard,{setPage});
  };

  return h('div',{className:'shell'},
    h('div',{className:'sidebar'},h(SidebarNav,{page,setPage,badges,onClose:null})),
    h('div',{className:`overlay${drawerOpen?' open':''}`,onClick:()=>setDrawerOpen(false)},
      h('div',{className:'drawer',onClick:e=>e.stopPropagation()},
        h(SidebarNav,{page,setPage,badges,onClose:()=>setDrawerOpen(false)})
      )
    ),
    h('div',{className:'main'},
      h('div',{className:'mobile-bar'},
        h('button',{className:'menu-btn',onClick:()=>setDrawerOpen(true)},h(IMenu)),
        h('span',null,currentLabel)
      ),
      renderPage()
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
