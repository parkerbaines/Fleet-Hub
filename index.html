/* ── Base reset ─────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#0f1117;color:#e2e8f0}
#root{height:100%;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a3048;border-radius:2px}
/* ── Layout ─────────────────────────────────────────────────────── */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:#181c27;border-right:0.5px solid #2a3048;display:flex;flex-direction:column}
.sidebar-logo{padding:18px 20px 14px;border-bottom:0.5px solid #2a3048}
.sidebar-logo h1{font-size:15px;font-weight:600;color:#e2e8f0;letter-spacing:-0.02em}
.sidebar-logo p{font-size:11px;color:#6b7a9f;margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px}
.nav-section{font-size:10px;color:#6b7a9f;text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 4px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:#6b7a9f;cursor:pointer;margin-bottom:1px;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{color:#e2e8f0;background:#1e2333}
.nav-item.active{background:rgba(59,126,255,.15);color:#3b7eff;font-weight:500}
.nav-badge{margin-left:auto;background:rgba(239,68,68,.2);color:#f87171;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.mobile-bar{display:none;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid #2a3048;background:#181c27}
.mobile-bar span{font-size:14px;font-weight:500}
.menu-btn{background:none;border:none;color:#6b7a9f;cursor:pointer;padding:4px;border-radius:6px;display:flex;flex-shrink:0}
.page{flex:1;overflow-y:auto;padding:20px 24px}
.overlay{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6)}
.overlay.open{display:flex}
.drawer{width:260px;background:#181c27;border-right:0.5px solid #2a3048;display:flex;flex-direction:column;position:relative;z-index:1}
/* ── Cards ─────────────────────────────────────────────────────── */
.card{background:#1e2333;border:0.5px solid #2a3048;border-radius:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:0.5px solid #2a3048;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:600;color:#e2e8f0;display:flex;align-items:center;gap:6px}
.card-link{font-size:11px;color:#3b7eff;cursor:pointer;background:none;border:none;font-family:inherit}
/* ── Metrics ────────────────────────────────────────────────────── */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.metric{background:#181c27;border:0.5px solid #2a3048;border-radius:8px;padding:14px 16px}
.metric.clickable{cursor:pointer;transition:border .15s}
.metric.clickable:hover{border-color:rgba(59,126,255,.5)}
.metric-label{font-size:11px;color:#6b7a9f;margin-bottom:6px}
.metric-value{font-size:26px;font-weight:600;color:#e2e8f0;line-height:1}
.metric-sub{font-size:11px;color:#6b7a9f;margin-top:4px}
.metric-sub.warn{color:#f59e0b}.metric-sub.danger{color:#ef4444}
.grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px}
/* ── Rows ───────────────────────────────────────────────────────── */
.divide-row,.row{border-bottom:0.5px solid #2a3048;display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background .1s}
.divide-row:last-child,.row:last-child{border-bottom:none}
.divide-row:hover,.row:hover{background:rgba(255,255,255,.03)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:#22c55e}.dot-amber{background:#f59e0b}.dot-red{background:#ef4444}.dot-gray{background:#6b7a9f}
/* ── Badges ─────────────────────────────────────────────────────── */
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;display:inline-block;white-space:nowrap}
.b-urgent{background:rgba(239,68,68,.2);color:#f87171}.b-high{background:rgba(245,158,11,.2);color:#fbbf24}
.b-normal{background:rgba(59,126,255,.2);color:#60a5fa}.b-low{background:rgba(107,122,159,.2);color:#94a3b8}
.b-open{background:rgba(245,158,11,.2);color:#fbbf24}.b-in_progress{background:rgba(59,126,255,.2);color:#60a5fa}
.b-on_hold{background:rgba(107,122,159,.2);color:#94a3b8}.b-completed{background:rgba(34,197,94,.2);color:#4ade80}
.b-cancelled{background:rgba(239,68,68,.2);color:#f87171}.b-active{background:rgba(34,197,94,.2);color:#4ade80}
.b-in_shop{background:rgba(245,158,11,.2);color:#fbbf24}.b-down{background:rgba(239,68,68,.2);color:#f87171}
.b-retired{background:rgba(107,122,159,.2);color:#94a3b8}
/* ── Buttons ────────────────────────────────────────────────────── */
.btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;border:none}
.btn-primary,.btn-p{background:#3b7eff;color:#fff;border:none}.btn-primary:hover,.btn-p:hover{background:#5a94ff}
.btn-primary:disabled,.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost,.btn-g{background:transparent;color:#94a3b8;border:0.5px solid #2a3048}.btn-ghost:hover,.btn-g:hover{background:#1e2333;color:#e2e8f0}
.btn-danger,.btn-d{background:transparent;color:#f87171;border:0.5px solid rgba(239,68,68,.3)}.btn-danger:hover,.btn-d:hover{background:rgba(239,68,68,.1)}
.btn-success,.btn-s{background:rgba(34,197,94,.12);color:#4ade80;border:0.5px solid rgba(34,197,94,.3)}.btn-success:hover,.btn-s:hover{background:rgba(34,197,94,.22)}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-icon,.icon-btn{background:none;border:none;color:#6b7a9f;cursor:pointer;padding:4px;border-radius:6px;display:flex;transition:color .15s}
.btn-icon:hover,.icon-btn:hover{color:#e2e8f0}
/* ── Forms ──────────────────────────────────────────────────────── */
.form-group,.fg{margin-bottom:14px}
.form-label,.fl{display:block;font-size:11px;color:#6b7a9f;margin-bottom:5px;font-weight:500}
.form-input,.form-select,.form-textarea,.fi,.fsel,.fta{width:100%;background:#181c27;border:0.5px solid #2a3048;border-radius:8px;padding:8px 12px;font-size:13px;color:#e2e8f0;font-family:inherit;transition:border .15s;outline:none;-webkit-appearance:none;appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus,.fi:focus,.fsel:focus,.fta:focus{border-color:#3b7eff}

  const loadAppUser=async(uid)=>{
    try{
      const{data,error}=await sb.from('app_users').select('*').eq('id',uid).single();
      if(error){console.warn('loadAppUser error:',error.message);setAppUser(null);}
      else setAppUser(data||null);
    }catch(e){console.warn('loadAppUser failed:',e);setAppUser(null);}
    finally{setAuthLoading(false);}
  };

  useEffect(()=>{
    // Get initial session
    sb.auth.getSession().then(({data:{session:s}})=>{
      setSession(s);
      if(s?.user) loadAppUser(s.user.id);
      else setAuthLoading(false);
    }).catch(()=>setAuthLoading(false));

    // Listen for auth changes
    const{data:{subscription}}=sb.auth.onAuthStateChange((_event,s)=>{
      setSession(s);
      if(s?.user) loadAppUser(s.user.id);
      else{setAppUser(null);setAuthLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const signIn=async(email,password)=>{
    const{error}=await sb.auth.signInWithPassword({email,password});
    return error;
  };
  const signOut=async()=>{
    await sb.auth.signOut();
    setSession(null);setAppUser(null);setAuthLoading(false);
  };
  const isAdmin=appUser?.role==='admin';
  const isTech=appUser?.role==='tech';
  const myTechId=appUser?.technician_id||null;
  return{session,appUser,authLoading,signIn,signOut,isAdmin,isTech,myTechId};
}

function LoginScreen({signIn}){
  const[mode,setMode]=useState('login');
  const[email,setEmail]=useState('');
  const[password,setPassword]=useState('');
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');

  const submit=async()=>{
    if(!email||!password){setErr('Email and password required');return;}
    setLoading(true);setErr('');
    const error=await signIn(email,password);
    setLoading(false);
    if(error)setErr(error.message==='Invalid login credentials'?'Incorrect email or password':error.message);
  };

  const sendReset=async()=>{
    if(!email.trim()){setErr('Enter your email address first');return;}
    setLoading(true);setErr('');
    const{error}=await sb.auth.resetPasswordForEmail(email.trim(),{redirectTo:window.location.origin});
    setLoading(false);
    if(error){setErr(error.message);return;}
    setMode('sent');
  };

  return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f1117'}},

function useQuery(fn,deps=[]){
  const[data,setData]=useState(null);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);
  const refetch=useCallback(async()=>{setLoading(true);setError(null);try{const r=await fn();if(r.error)throw r.error;setData(r.data);}catch(e){setError(e.message);}finally{setLoading(false);}},deps);
  useEffect(()=>{refetch();},[refetch]);
  return{data,loading,error,refetch};
}

function ServiceIntervals({setPage,isTech=false}){
  const{data:types,loading:tLoad,refetch:refetchTypes}=useQuery(()=>sb.from('interval_types').select('*').order('name'));
  const{data:assignments,refetch:refetchAssign}=useQuery(()=>sb.from('asset_intervals').select('*,asset:assets(id,name,asset_number,asset_type,odometer_miles),interval_type:interval_types(name,interval_miles,interval_days,category)').order('next_service_miles',{ascending:true,nullsFirst:false}));
  const{data:assets}=useQuery(()=>sb.from('assets').select('id,name,asset_number,asset_type,odometer_miles').neq('status','retired').order('name'));
  const[tab,setTab]=useState('overview');
  const[showTypeModal,setShowTypeModal]=useState(false);
  const[showAssignModal,setShowAssignModal]=useState(false);
  const[editType,setEditType]=useState(null);
  const[filterCat,setFilterCat]=useState('');
  const[sortDir,setSortDir]=useState('asc');
  const[selected,setSelected]=useState(new Set());
  const[snoozeModal,setSnoozeModal]=useState(null); // {id, name}
  const[resolveModal,setResolveModal]=useState(null); // assignment

  const now=new Date();

  const getStatus=(a)=>{
    const cur=a.asset?.odometer_miles||0;
    const milesUntil=a.next_service_miles!=null?a.next_service_miles-cur:null;
    const daysUntil=a.next_service_date?Math.ceil((new Date(a.next_service_date)-now)/86400000):null;
    // Check if snoozed
    if(a.snoozed_until&&new Date(a.snoozed_until)>now)return{state:'snoozed',milesUntil,daysUntil};
    if(a.snoozed_until_miles&&cur<a.snoozed_until_miles)return{state:'snoozed',milesUntil,daysUntil};
    if(milesUntil!=null&&milesUntil<=0)return{state:'overdue',milesUntil,daysUntil};
    if(daysUntil!=null&&daysUntil<=0)return{state:'overdue',milesUntil,daysUntil};
    if(milesUntil!=null&&milesUntil<=500)return{state:'due_soon',milesUntil,daysUntil};
    if(daysUntil!=null&&daysUntil<=14)return{state:'due_soon',milesUntil,daysUntil};
    return{state:'ok',milesUntil,daysUntil};
  };

  const stateStyle={
    overdue:{bg:'rgba(239,68,68,.15)',color:'#f87171',label:'OVERDUE'},
    due_soon:{bg:'rgba(245,158,11,.15)',color:'#fbbf24',label:'Due Soon'},
    ok:{bg:'rgba(34,197,94,.15)',color:'#4ade80',label:'OK'},
    snoozed:{bg:'rgba(107,122,159,.15)',color:'#94a3b8',label:'Snoozed'},
  };

  const cats=[...new Set((types||[]).map(t=>t.category).filter(Boolean))].sort();
  const filtered=[...(assignments||[]).filter(a=>!filterCat||a.interval_type?.category===filterCat)].sort((a,b)=>{
    const cA=a.asset?.odometer_miles||0,cB=b.asset?.odometer_miles||0;
    const mA=a.next_service_miles!=null?a.next_service_miles-cA:null;
    const mB=b.next_service_miles!=null?b.next_service_miles-cB:null;
    if(mA===null&&mB===null)return 0;if(mA===null)return 1;if(mB===null)return -1;
    return sortDir==='asc'?mA-mB:mB-mA;
  });
  const overdue=filtered.filter(a=>getStatus(a).state==='overdue');
  const dueSoon=filtered.filter(a=>getStatus(a).state==='due_soon');

  const toggleSelect=(id)=>setSelected(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleAll=()=>setSelected(prev=>prev.size===filtered.length?new Set():new Set(filtered.map(a=>a.id)));

  const bulkDelete=async()=>{
    if(isTech)return;
    if(!confirm(`Remove ${selected.size} interval assignment(s)?`))return;
    for(const id of selected)await sb.from('asset_intervals').delete().eq('id',id);
    setSelected(new Set());refetchAssign();
  };

  // Dismiss: advance next_service by one interval
  const dismiss=async(a)=>{
    const cur=a.asset?.odometer_miles||0;
    const it=a.interval_type;
    const newNextMiles=it?.interval_miles?(a.next_service_miles||cur)+it.interval_miles:null;
    const newNextDate=it?.interval_days&&a.next_service_date?new Date(new Date(a.next_service_date).getTime()+it.interval_days*86400000).toISOString().slice(0,10):null;
    await sb.from('asset_intervals').update({next_service_miles:newNextMiles,next_service_date:newNextDate,snoozed_until:null,snoozed_until_miles:null,updated_at:new Date().toISOString()}).eq('id',a.id);
    refetchAssign();

function TechDashboard({setPage,myTechId=null}){
  const{data:wos,loading:wl}=useQuery(()=>sb.from('work_orders')
    .select('*,asset:assets(name,asset_number),technician:technicians(name)')
    .in('status',['open','in_progress','on_hold'])
    .order('created_at',{ascending:false}));
  const{data:intervals}=useQuery(()=>sb.from('asset_intervals')
    .select('*,asset:assets(name,asset_number,odometer_miles),interval_type:interval_types(name,category)')
    .order('next_service_date',{ascending:true,nullsFirst:false}));

  const now=new Date();
  const myWOs=myTechId?(wos||[]).filter(wo=>!wo.technician_id||wo.technician_id===myTechId):(wos||[]);
  const urgentWOs=myWOs.filter(wo=>wo.priority==='urgent');
  const dueIntervals=(intervals||[]).filter(a=>{
    const cur=a.asset?.odometer_miles||0;
    const milesUntil=a.next_service_miles!=null?a.next_service_miles-cur:null;
    const daysUntil=a.next_service_date?Math.ceil((new Date(a.next_service_date)-now)/86400000):null;
    return(milesUntil!=null&&milesUntil<=500)||(daysUntil!=null&&daysUntil<=14);
  });

  return h('div',{className:'page'},
    h('div',{className:'page-header'},
      h('div',null,h('h2',null,'My Dashboard'),h('p',null,"Today's work overview"))

    // Alert banners
    urgentWOs.length>0&&h('div',{className:'alert alert-danger',style:{marginBottom:10}},
      h(IAlert),' ',urgentWOs.length+' urgent work order'+(urgentWOs.length>1?'s':'')+' — '+urgentWOs.map(w=>w.order_number).join(', ')

    dueIntervals.length>0&&h('div',{className:'alert alert-warn',style:{marginBottom:10}},
      h(IAlert),' ',dueIntervals.length+' service interval'+(dueIntervals.length>1?'s':'')+' due soon'

    // Open Work Orders

      h('div',{className:'card-header'},
        h('span',{className:'card-title'},'Open Work Orders'),
        h('button',{className:'card-link',onClick:()=>setPage('workorders')},'View all →')
      ),
      wl?h('div',{style:{padding:24,textAlign:'center',color:'#6b7a9f'}},'Loading...'):
      myWOs.length===0?h('div',{style:{padding:24,textAlign:'center',color:'#6b7a9f'}},myTechId?'No work orders assigned to you 🎉':'No open work orders 🎉'):
      myWOs.slice(0,8).map(wo=>h('div',{key:wo.id,className:'divide-row',onClick:()=>setPage('wo-'+wo.id),style:{cursor:'pointer'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,flex:1,minWidth:0}},
          h('span',{className:'mono',style:{fontSize:12,flexShrink:0}},wo.order_number),
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{style:{fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},wo.title),
            h('div',{style:{fontSize:11,color:'#6b7a9f',marginTop:2}},(wo.asset?.asset_number?wo.asset.asset_number+' — ':'')+( wo.asset?.name||'No asset'))
          )
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:8,flexShrink:0}},
          h('span',{className:'badge b-'+wo.priority},wo.priority),
          h('span',{className:'badge b-'+wo.status},(wo.status||'').replace('_',' '))

    ),

    // Two column: service intervals + quick links
    h('div',{className:'grid2'},

      // Due Soon Intervals

        h('div',{className:'card-header'},

          h('button',{className:'card-link',onClick:()=>setPage('intervals')},'View all →')

        dueIntervals.length===0
          ?h('div',{style:{padding:24,textAlign:'center',color:'#6b7a9f'}},'All intervals on schedule ✓')

              const milesUntil=a.next_service_miles!=null?a.next_service_miles-cur:null;

      // Quick nav links

    if(page.startsWith('wo-edit-'))return h(WOForm,{id:page.replace('wo-edit-',''),setPage,isAdmin,isTech,myTechId});
    if(page.startsWith('wo-'))return h(WOForm,{id:page.replace('wo-',''),setPage,isAdmin,isTech,myTechId});
    if(page==='fleet'||page.startsWith('fleet-back-')||page.startsWith('fleet-status-'))return h(Fleet,{setPage,isTech,initialType:page.startsWith('fleet-back-')?page.replace('fleet-back-',''):'',initialStatus:page.startsWith('fleet-status-')?page.replace('fleet-status-',''):''});
    if(page==='asset-new')return h(AssetForm,{id:null,setPage});
    if(page.startsWith('asset-edit-'))return h(AssetForm,{id:page.replace('asset-edit-',''),setPage});
    if(page.startsWith('asset-'))return h(AssetDetail,{id:page.replace('asset-',''),setPage,isTech});
    if(page==='parts')return h(Parts,{setPage,isTech});
    if(page==='technicians')return h(Technicians,null);
    if(page==='servicelogs')return h(ServiceLogs,null);
    if(page==='intervals')return h(ServiceIntervals,{setPage,isTech});
    if(page==='scheduler')return h(Scheduler,{setPage});
    if(page==='documents')return h(Documents,{setPage,isTech});
    if(page==='users'&&isAdmin)return h(UsersPage,{setPage});
    return h(Dashboard,{setPage,isTech,isAdmin});
  };
  return h('div',{className:'shell'},
    h('button',{
      onClick:toggleTheme,
      title:isDark?'Switch to light mode':'Switch to dark mode',
      style:{position:'fixed',bottom:20,right:20,zIndex:200,background:isDark?'#1e2333':'#fff',border:'0.5px solid '+(isDark?'#2a3048':'#e2e8f0'),borderRadius:20,padding:'8px 14px',cursor:'pointer',boxShadow:'0 4px 12px rgba(0,0,0,.25)',display:'flex',alignItems:'center',gap:6,color:isDark?'#e2e8f0':'#1a202c',fontFamily:'inherit',fontSize:12,fontWeight:500}
    },isDark?'☀️  Light':'🌙  Dark'),
    h('div',{className:'sidebar'},h(SidebarNav,{page,setPage,badges,appUser,signOut,visibleNav,onClose:null})),
    h('div',{className:'overlay'+(drawerOpen?' open':''),onClick:()=>setDrawerOpen(false)},h('div',{className:'drawer',onClick:e=>e.stopPropagation()},h(SidebarNav,{page,setPage,badges,appUser,signOut,visibleNav,onClose:()=>setDrawerOpen(false)}))),
    h('div',{className:'main'},h('div',{className:'mobile-bar'},h('button',{className:'menu-btn',onClick:()=>setDrawerOpen(true)},h(IMenu)),h('span',null,lbl)),render())
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));




</script>
