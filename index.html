<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>FleetOps</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0f1117"/>
</head>
<body style="margin:0;background:#0f1117;color:#e2e8f0;font-family:system-ui,sans-serif">
<div id="root" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px">
  <div style="font-size:24px;font-weight:600">Loading FleetOps...</div>
  <div id="status" style="font-size:13px;color:#6b7a9f">Initializing</div>
</div>

<script>
function status(msg) {
  document.getElementById('status').textContent = msg;
  console.log(msg);
}
function err(msg) {
  document.getElementById('root').innerHTML = '<div style="padding:40px;max-width:600px;margin:auto"><h2 style="color:#f87171;margin-bottom:12px">Error</h2><pre style="color:#e2e8f0;font-size:13px;white-space:pre-wrap;background:#1e2333;padding:16px;border-radius:8px">' + msg + '</pre></div>';
}
window.onerror = function(msg, src, line, col, error) {
  err('JS Error:\n' + msg + '\nLine: ' + line + '\nColumn: ' + col + (error ? '\n\n' + error.stack : ''));
  return true;
};
window.onunhandledrejection = function(e) {
  err('Promise Error:\n' + (e.reason?.stack || e.reason || 'Unknown'));
};
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" 
  crossorigin 
  onload="status('React loaded')" 
  onerror="err('Failed to load React from unpkg. Check network connection.')">
</script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" 
  crossorigin
  onload="status('ReactDOM loaded')"
  onerror="err('Failed to load ReactDOM')">
</script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js" 
  crossorigin
  onload="status('Supabase loaded')"
  onerror="err('Failed to load Supabase')">
</script>

<script>
// Wait for all scripts then boot
function boot() {
  if (typeof React === 'undefined') { err('React not available'); return; }
  if (typeof ReactDOM === 'undefined') { err('ReactDOM not available'); return; }
  if (typeof supabase === 'undefined') { err('Supabase not available'); return; }
  status('All libraries loaded, starting app...');
  
  try {
    const {createElement:h, useState, useEffect, useCallback, useRef, Fragment} = React;
    const SUPA_URL = 'https://zmxynphetgelskqnadbg.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpteHlucGhldGdlbHNrcW5hZGJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2Mzg5ODgsImV4cCI6MjA5MDIxNDk4OH0.BDHe4XsGCvHY0sIxN5ncIV7-EYEj4lq-nuxFfvySZgU';
    const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

    function App() {
      const [page, setPage] = useState('loading');
      const [assets, setAssets] = useState([]);
      const [wos, setWos] = useState([]);
      const [parts, setParts] = useState([]);
      const [techs, setTechs] = useState([]);
      const [menu, setMenu] = useState(false);
      const [nav, setNav] = useState('dashboard');

      useEffect(() => {
        Promise.all([
          sb.from('assets').select('*').order('name'),
          sb.from('work_orders').select('*,asset:assets(name,asset_number),technician:technicians(name)').order('created_at', {ascending:false}),
          sb.from('parts').select('*').order('name'),
          sb.from('technicians').select('*').order('name'),
        ]).then(([a, w, p, t]) => {
          if (!a.error) setAssets(a.data || []);
          if (!w.error) setWos(w.data || []);
          if (!p.error) setParts(p.data || []);
          if (!t.error) setTechs(t.data || []);
          setPage('ready');
        }).catch(e => {
          setPage('error_' + e.message);
        });
      }, []);

      if (page === 'loading') return h('div', {style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:12,background:'#0f1117',color:'#e2e8f0'}},
        h('div', {style:{fontSize:22,fontWeight:600}}, 'FleetOps'),
        h('div', {style:{fontSize:13,color:'#6b7a9f'}}, 'Loading your data...')
      );
      
      if (page.startsWith('error_')) return h('div', {style:{padding:40,color:'#f87171'}}, 'Database error: ' + page.replace('error_', ''));

      const openWOs = wos.filter(w => ['open','in_progress'].includes(w.status));
      const lowParts = parts.filter(p => p.quantity_on_hand <= p.reorder_point);

      // Simple working app
      return h('div', {style:{display:'flex',height:'100vh',overflow:'hidden',background:'#0f1117',color:'#e2e8f0',fontFamily:"'system-ui',sans-serif"}},
        // Sidebar
        h('div', {style:{width:220,background:'#181c27',borderRight:'0.5px solid #2a3048',display:'flex',flexDirection:'column',flexShrink:0}},
          h('div', {style:{padding:'18px 20px 14px',borderBottom:'0.5px solid #2a3048'}},
            h('div', {style:{fontSize:15,fontWeight:600,letterSpacing:'-0.02em'}}, 'FleetOps'),
            h('div', {style:{fontSize:11,color:'#6b7a9f',marginTop:2}}, 'Maintenance Platform')
          ),
          h('nav', {style:{flex:1,padding:'12px 10px',overflowY:'auto'}},
            [
              {id:'dashboard', label:'Dashboard'},
              {id:'workorders', label:'Work Orders', badge: openWOs.length},
              {id:'fleet', label:'Fleet'},
              {id:'parts', label:'Parts Inventory', badge: lowParts.length},
              {id:'technicians', label:'Technicians'},
              {id:'servicelogs', label:'Service Logs'},
            ].map(item => h('button', {
              key: item.id,
              onClick: () => setNav(item.id),
              style: {
                display:'flex', alignItems:'center', gap:8, width:'100%', padding:'8px 10px',
                borderRadius:8, fontSize:13, cursor:'pointer', border:'none', textAlign:'left',
                background: nav===item.id ? 'rgba(59,126,255,.15)' : 'transparent',
                color: nav===item.id ? '#3b7eff' : '#6b7a9f',
                fontWeight: nav===item.id ? 500 : 400,
                marginBottom:1, transition:'all .15s', fontFamily:'inherit'
              }
            },
              item.label,
              item.badge > 0 && h('span', {style:{marginLeft:'auto',background:'rgba(239,68,68,.2)',color:'#f87171',fontSize:10,fontWeight:600,padding:'1px 6px',borderRadius:10}}, item.badge)
            ))
          )
        ),
        // Main content
        h('div', {style:{flex:1,overflow:'auto',padding:24}},
          nav === 'dashboard' && h('div', null,
            h('h2', {style:{fontSize:18,fontWeight:600,marginBottom:20}}, 'Dashboard'),
            h('div', {style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}},
              [
                {label:'Total Assets', value:assets.length, sub:'Vehicles, trailers & equipment'},
                {label:'Open Work Orders', value:openWOs.length, sub: openWOs.filter(w=>w.priority==='urgent').length + ' urgent', warn: openWOs.filter(w=>w.priority==='urgent').length > 0},
                {label:'Active Technicians', value:techs.filter(t=>t.status==='active').length, sub:'Assigned technicians'},
                {label:'Parts Low / Out', value:lowParts.length, sub:parts.filter(p=>p.quantity_on_hand===0).length + ' out of stock', warn:true},
              ].map((m,i) => h('div', {key:i, style:{background:'#181c27',borderRadius:8,padding:'14px 16px'}},
                h('div', {style:{fontSize:11,color:'#6b7a9f',marginBottom:6}}, m.label),
                h('div', {style:{fontSize:26,fontWeight:600,lineHeight:1,marginBottom:4}}, m.value),
                h('div', {style:{fontSize:11,color:m.warn&&m.value>0?'#f59e0b':'#6b7a9f'}}, m.sub)
              ))
            ),
            h('div', {style:{display:'grid',gridTemplateColumns:'1.6fr 1fr',gap:16}},
              h('div', {style:{background:'#1e2333',border:'0.5px solid #2a3048',borderRadius:12}},
                h('div', {style:{padding:'14px 16px',borderBottom:'0.5px solid #2a3048',fontWeight:600,fontSize:13}}, 'Open Work Orders'),
                openWOs.length === 0
                  ? h('div', {style:{padding:24,textAlign:'center',color:'#6b7a9f',fontSize:13}}, 'No open work orders')
                  : openWOs.slice(0,6).map(wo => h('div', {key:wo.id, style:{padding:'10px 16px',borderBottom:'0.5px solid #2a3048',display:'flex',gap:10,alignItems:'center',cursor:'pointer'}, onClick:()=>setNav('workorders')},
                    h('span', {style:{fontFamily:'monospace',fontSize:11,color:'#6b7a9f',width:56,flexShrink:0}}, wo.order_number),
                    h('div', {style:{flex:1,minWidth:0}},
                      h('div', {style:{fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, wo.title),
                      h('div', {style:{fontSize:11,color:'#6b7a9f'}}, (wo.asset?.name||'No asset') + ' · ' + (wo.technician?.name||'Unassigned'))
                    ),
                    h('span', {style:{fontSize:10,padding:'2px 8px',borderRadius:10,background:wo.priority==='urgent'?'rgba(239,68,68,.2)':wo.priority==='high'?'rgba(245,158,11,.2)':'rgba(59,126,255,.2)',color:wo.priority==='urgent'?'#f87171':wo.priority==='high'?'#fbbf24':'#60a5fa'}}, wo.priority)
                  ))
              ),
              h('div', {style:{background:'#1e2333',border:'0.5px solid #2a3048',borderRadius:12}},
                h('div', {style:{padding:'14px 16px',borderBottom:'0.5px solid #2a3048',fontWeight:600,fontSize:13}}, 'Fleet Status'),
                assets.slice(0,8).map(a => h('div', {key:a.id, style:{padding:'10px 16px',borderBottom:'0.5px solid #2a3048',display:'flex',gap:10,alignItems:'center'}},
                  h('span', {style:{width:8,height:8,borderRadius:'50%',background:a.status==='active'?'#22c55e':a.status==='in_shop'?'#f59e0b':a.status==='down'?'#ef4444':'#6b7a9f',flexShrink:0}}),
                  h('div', {style:{flex:1,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, a.name),
                  h('span', {style:{fontSize:11,color:'#6b7a9f',textTransform:'capitalize'}}, a.status.replace('_',' '))
                ))
              )
            )
          ),
          nav === 'workorders' && h('div', null,
            h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},
              h('h2', {style:{fontSize:18,fontWeight:600}}, 'Work Orders'),
              h('button', {style:{background:'#3b7eff',color:'#fff',border:'none',padding:'7px 16px',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:500}}, '+ New Work Order')
            ),
            h('div', {style:{background:'#1e2333',border:'0.5px solid #2a3048',borderRadius:12,overflow:'auto'}},
              h('table', {style:{width:'100%',fontSize:13,borderCollapse:'collapse'}},
                h('thead', null, h('tr', null,
                  ['Order #','Title','Asset','Technician','Priority','Status','Due'].map(c => h('th', {key:c, style:{textAlign:'left',fontSize:11,color:'#6b7a9f',padding:'10px 16px',borderBottom:'0.5px solid #2a3048'}}, c))
                )),
                h('tbody', null,
                  wos.length === 0
                    ? h('tr', null, h('td', {colSpan:7, style:{textAlign:'center',color:'#6b7a9f',padding:32}}, 'No work orders yet'))
                    : wos.slice(0,20).map(wo => h('tr', {key:wo.id, style:{cursor:'pointer'}},
                      h('td', {style:{padding:'11px 16px',borderBottom:'0.5px solid #2a3048',fontFamily:'monospace',fontSize:11,color:'#6b7a9f'}}, wo.order_number),
                      h('td', {style:{padding:'11px 16px',borderBottom:'0.5px solid #2a3048',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, wo.title),
                      h('td', {style:{padding:'11px 16px',borderBottom:'0.5px solid #2a3048',color:'#94a3b8',fontSize:12}}, wo.asset?.name||'—'),
                      h('td', {style:{padding:'11px 16px',borderBottom:'0.5px solid #2a3048',color:'#94a3b8',fontSize:12}}, wo.technician?.name||'Unassigned'),
                      h('td', {style:{padding:'11px 16px',borderBottom:'0.5px solid #2a3048'}},
                        h('span', {style:{fontSize:10,padding:'2px 8px',borderRadius:10,background:wo.priority==='urgent'?'rgba(239,68,68,.2)':wo.priority==='high'?'rgba(245,158,11,.2)':'rgba(59,126,255,.2)',color:wo.priority==='urgent'?'#f87171':wo.priority==='high'?'#fbbf24':'#60a5fa'}}, wo.priority)
                      ),
                      h('td', {style:{padding:'11px 16px',borderBottom:'0.5px solid #2a3048'}},
                        h('span', {style:{fontSize:10,padding:'2px 8px',borderRadius:10,background:wo.status==='completed'?'rgba(34,197,94,.2)':wo.status==='in_progress'?'rgba(59,126,255,.2)':'rgba(245,158,11,.2)',color:wo.status==='completed'?'#4ade80':wo.status==='in_progress'?'#60a5fa':'#fbbf24'}}, wo.status.replace('_',' '))
                      ),
                      h('td', {style:{padding:'11px 16px',borderBottom:'0.5px solid #2a3048',color:'#6b7a9f',fontSize:12}}, wo.due_date ? new Date(wo.due_date).toLocaleDateString() : '—')
                    ))
                )
              )
            )
          ),
          nav === 'fleet' && h('div', null,
            h('h2', {style:{fontSize:18,fontWeight:600,marginBottom:20}}, 'Fleet (' + assets.length + ' assets)'),
            h('div', {style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:12}},
              assets.map(a => h('div', {key:a.id, style:{background:'#1e2333',border:'0.5px solid #2a3048',borderRadius:12,padding:16}},
                h('div', {style:{display:'flex',justifyContent:'space-between',marginBottom:10}},
                  h('span', {style:{fontSize:11,color:'#6b7a9f',textTransform:'capitalize'}}, a.asset_type),
                  h('span', {style:{fontSize:10,padding:'2px 8px',borderRadius:10,background:a.status==='active'?'rgba(34,197,94,.2)':'rgba(245,158,11,.2)',color:a.status==='active'?'#4ade80':'#fbbf24'}}, a.status.replace('_',' '))
                ),
                h('div', {style:{fontSize:14,fontWeight:500,marginBottom:4}}, a.name),
                h('div', {style:{fontSize:12,color:'#6b7a9f',marginBottom:10}}, a.asset_number || 'No ID'),
                h('div', {style:{fontSize:12,color:'#94a3b8'}}, [a.year, a.make, a.model].filter(Boolean).join(' ') || '—')
              ))
            )
          ),
          nav === 'parts' && h('div', null,
            h('h2', {style:{fontSize:18,fontWeight:600,marginBottom:20}}, 'Parts Inventory'),
            h('div', {style:{background:'#1e2333',border:'0.5px solid #2a3048',borderRadius:12,overflow:'auto'}},
              h('table', {style:{width:'100%',fontSize:13,borderCollapse:'collapse'}},
                h('thead', null, h('tr', null,
                  ['Part #','Name','Category','On Hand','Reorder At','Unit Cost','Supplier'].map(c => h('th', {key:c, style:{textAlign:'left',fontSize:11,color:'#6b7a9f',padding:'10px 16px',borderBottom:'0.5px solid #2a3048'}}, c))
                )),
                h('tbody', null,
                  parts.length === 0
                    ? h('tr', null, h('td', {colSpan:7, style:{textAlign:'center',color:'#6b7a9f',padding:32}}, 'No parts yet'))
                    : parts.map(p => {
                      const isLow = p.quantity_on_hand <= p.reorder_point;
                      const isOut = p.quantity_on_hand === 0;
                      return h('tr', {key:p.id},
                        h('td', {style:{padding:'10px 16px',borderBottom:'0.5px solid #2a3048',fontFamily:'monospace',fontSize:11,color:'#6b7a9f'}}, p.part_number||'—'),
                        h('td', {style:{padding:'10px 16px',borderBottom:'0.5px solid #2a3048',fontWeight:500}}, p.name),
                        h('td', {style:{padding:'10px 16px',borderBottom:'0.5px solid #2a3048',color:'#6b7a9f',fontSize:12,textTransform:'capitalize'}}, p.category||'—'),
                        h('td', {style:{padding:'10px 16px',borderBottom:'0.5px solid #2a3048',fontWeight:600,color:isOut?'#f87171':isLow?'#fbbf24':'#4ade80'}}, p.quantity_on_hand),
                        h('td', {style:{padding:'10px 16px',borderBottom:'0.5px solid #2a3048',color:'#6b7a9f',fontSize:12}}, p.reorder_point),
                        h('td', {style:{padding:'10px 16px',borderBottom:'0.5px solid #2a3048'}}, p.unit_cost ? '$'+parseFloat(p.unit_cost).toFixed(2) : '—'),
                        h('td', {style:{padding:'10px 16px',borderBottom:'0.5px solid #2a3048',color:'#6b7a9f',fontSize:12}}, p.supplier||'—')
                      );
                    })
                )
              )
            )
          ),
          nav === 'technicians' && h('div', null,
            h('h2', {style:{fontSize:18,fontWeight:600,marginBottom:20}}, 'Technicians'),
            h('div', {style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12}},
              techs.map(t => h('div', {key:t.id, style:{background:'#1e2333',border:'0.5px solid #2a3048',borderRadius:12,padding:16,display:'flex',gap:12}},
                h('div', {style:{width:40,height:40,borderRadius:'50%',background:'rgba(59,126,255,.2)',color:'#60a5fa',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:500,flexShrink:0}},
                  t.name.trim().split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase()
                ),
                h('div', null,
                  h('div', {style:{fontSize:14,fontWeight:500,marginBottom:2}}, t.name),
                  t.specialty && h('div', {style:{fontSize:12,color:'#6b7a9f',textTransform:'capitalize'}}, t.specialty),
                  t.email && h('div', {style:{fontSize:12,color:'#6b7a9f'}}, t.email)
                )
              ))
            )
          ),
          nav === 'servicelogs' && h('div', null,
            h('h2', {style:{fontSize:18,fontWeight:600,marginBottom:20}}, 'Service Logs'),
            h('div', {style:{color:'#6b7a9f',fontSize:13}}, 'Service log view coming soon.')
          )
        )
      );
    }

    status('Rendering app...');
    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    
  } catch(e) {
    err('Boot error:\n' + (e.stack || e.message));
  }
}

// Boot after page loads
if (document.readyState === 'complete') {
  setTimeout(boot, 100);
} else {
  window.addEventListener('load', () => setTimeout(boot, 100));
}
</script>
</body>
</html>
